<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام ال وحيد - الإصدار الاحترافي</title>

    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { 
            --primary: #b08d57; 
            --primary-light: #d4af37;
            --gold-gradient: linear-gradient(135deg, #f1c40f, #b08d57);
            --bg: #0f172a; --text: #f1f5f9; --card: #1e293b; --border: #334155; 
            --dark-accent: #020617; --danger: #ff4757; --success: #2ed573;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }

        header { 
            background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(10px);
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }

        .brand-container { display: flex; align-items: center; gap: 15px; }
        .brand-name {
            font-family: 'Aref Ruqaa', serif; font-size: 28px; background: var(--gold-gradient); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.3));
        }
        .logo-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }

        .nav-tabs { display: flex; background: var(--dark-accent); margin: 20px; border-radius: 12px; padding: 5px; border: 1px solid var(--border); }
        .nav-tabs button { flex: 1; padding: 12px; border: none; background: none; color: #94a3b8; font-weight: 600; cursor: pointer; transition: 0.3s; border-radius: 8px; font-family: 'Cairo'; }
        .nav-tabs button.active { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }

        .container { padding: 0 20px 40px; max-width: 900px; margin: 0 auto; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: var(--shadow); }
        .section-title { color: var(--primary); font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-right: 4px solid var(--primary); padding-right: 15px; }

        input { width: 100%; padding: 12px 15px; margin: 10px 0; border: 1px solid var(--border); border-radius: 10px; background: #0f172a; color: var(--text); font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }

        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s ease; font-family: 'Cairo'; }
        .btn-main { background: var(--primary); color: white; width: 100%; font-size: 18px; }
        .grid-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .full-width { grid-column: span 2; }

        .table-container { overflow-x: auto; margin-top: 20px; border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; background: #1e293b; }
        th { background: #0f172a; color: var(--primary); padding: 15px; }
        td { padding: 12px; border-top: 1px solid var(--border); text-align: center; }

        .search-wrapper { position: relative; width: 100%; }
        .results-box { position: absolute; background: #1e293b; border: 1px solid var(--primary); width: 100%; z-index: 1100; max-height: 200px; overflow-y: auto; border-radius: 0 0 10px 10px; top: 52px; }
        .result-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .result-item:hover { background: var(--primary); color: white; }

        .item-card { background: #0f172a; border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none !important; }

        /* تنسيق الفاتورة عند التصدير */
        #finalExportContainer { direction: rtl; padding: 40px; background: #fff !important; width: 750px; position: fixed; left: -9999px; top: 0; color: #000 !important; }
        #finalExportContainer * { color: #000 !important; }
        .invoice-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 2px solid #000; }
        .invoice-table th, .invoice-table td { padding: 12px; border: 1px solid #000; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; inset:0; background:var(--dark-accent); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <div class="card" style="width:320px; text-align:center; border-top: 4px solid var(--primary);">
        <img src="https://i.ibb.co/4R44srhj/image.jpg" style="width: 100px; height:100px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 15px;">
        <div class="brand-name" style="font-size: 35px; margin-bottom: 15px;">ال وحيد</div>
        <input type="password" id="passInput" placeholder="أدخل الرمز (123)" style="text-align:center;">
        <button class="btn btn-main" onclick="checkPassword()">دخول للنظام</button>
    </div>
</div>

<div id="appContent" class="hidden">
    <header>
        <div class="brand-container">
            <img src="https://i.ibb.co/4R44srhj/image.jpg" class="logo-img">
            <div class="brand-name">ال وحيد</div>
        </div>
    </header>

    <div class="nav-tabs">
        <button id="tab1" class="active" onclick="switchPage('order')">📑 تسجيل طلب</button>
        <button id="tab2" onclick="switchPage('browse')">📦 المخزن</button>
    </div>

    <div class="container">
        <div id="orderPage">
            <div class="card">
                <div class="section-title">إضافة أصناف الطلبية</div>
                <input type="text" id="clientName" placeholder="اسم العميل...">
                <div style="display: flex; gap: 10px;">
                    <div class="search-wrapper">
                        <input type="text" id="itemSearch" placeholder="ابحث عن مادة..." autocomplete="off">
                        <div id="results" class="results-box hidden"></div>
                    </div>
                    <button class="btn" style="background:#334155;" onclick="startVoice('itemSearch')">🎤</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="qty" placeholder="الكمية" style="flex: 1;">
                    <button class="btn btn-main" style="flex: 2;" onclick="addItem()">➕ إضافة</button>
                </div>

                <div class="table-container">
                    <table id="resultTable">
                        <thead><tr><th>المادة</th><th>الكمية</th><th>حذف</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div class="grid-buttons">
                    <button class="btn full-width" style="background:#8b5cf6; color:white;" onclick="shareAsImage()">📤 مشاركة واتساب</button>
                    <button class="btn" style="background:#10b981; color:white;" onclick="exportAsImage()">🖼️ حفظ صورة</button>
                    <button class="btn" style="background:var(--primary); color:white;" onclick="exportPDF()">📄 ملف PDF</button>
                    <button class="btn full-width" style="background:#444; color:white;" onclick="clearTable()">🗑️ مسح الجدول</button>
                </div>
            </div>
        </div>

        <div id="browsePage" class="hidden">
            <div class="card">
                <div class="section-title">إدارة الأصناف</div>
                <button id="syncBtn" class="btn btn-main" style="background:var(--success); margin-bottom: 15px;" onclick="syncFromCloud()">🔄 مزامنة من جوجل شيت</button>
                <input type="text" id="newItemName" placeholder="صنف جديد..." oninput="renderCloudItems(this.value)">
                <button class="btn btn-main" onclick="addCloudItemManual()">حفظ صنف جديد ✅</button>
                <div id="itemsGrid" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>
</div>

<div id="finalExportContainer">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #b08d57; padding-bottom: 15px; margin-bottom: 20px;">
        <img src="https://i.ibb.co/4R44srhj/image.jpg" crossOrigin="anonymous" style="width: 100px; height:100px; border-radius: 50%;">
        <div style="text-align: left;">
            <h1 style="margin: 0; font-size: 40px; font-family: 'Aref Ruqaa'; color: #b08d57;">ال وحيد</h1>
            <p style="margin: 0; font-size: 18px;">كشف طلب مواد</p>
        </div>
    </div>
    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
        <div style="font-size: 20px;">السيد: <strong id="expClient"></strong></div>
        <div style="font-size: 18px;">التاريخ: <span id="expDate"></span></div>
    </div>
    <table class="invoice-table">
        <thead><tr><th>م</th><th style="text-align: right;">الصنف</th><th>الكمية</th></tr></thead>
        <tbody id="expBody"></tbody>
    </table>
    <div style="margin-top: 50px; text-align: right;">
        <p style="font-weight: bold; border-bottom: 2px solid #000; display: inline-block;">أ. احمد وحيد / 01007519016</p>
    </div>
</div>

<script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycby94J0O_uH3WIFzLoelLDAVMagTZEGbo0LAfbVaVR_52wgSoCtbqJ-6ZHjbnUBujlfc/exec';
    let localItems = JSON.parse(localStorage.getItem("items")) || ["إسمنت", "حديد", "رمل"];

    // إصلاح دالة الدخول
    function checkPassword() {
        const pass = document.getElementById("passInput").value.trim();
        if(pass === "123") {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("appContent").classList.remove("hidden");
            renderCloudItems();
        } else {
            alert("الرمز خطأ! حاول مجدداً.");
        }
    }

    // وظائف المخزن والمزامنة
    async function syncFromCloud() {
        const btn = document.getElementById("syncBtn");
        try {
            btn.innerHTML = "جاري التحميل..."; btn.disabled = true;
            const response = await fetch(GOOGLE_URL);
            const cloudData = await response.json();
            if (Array.isArray(cloudData)) {
                localItems = [...new Set([...localItems, ...cloudData])];
                localStorage.setItem("items", JSON.stringify(localItems));
                renderCloudItems();
                alert("تم تحديث البيانات بنجاح!");
            }
        } catch (e) { alert("حدث خطأ في المزامنة"); }
        finally { btn.innerHTML = "🔄 مزامنة من جوجل شيت"; btn.disabled = false; }
    }

    function renderCloudItems(filter = "") {
        const grid = document.getElementById("itemsGrid");
        grid.innerHTML = "";
        localItems.filter(i => i.includes(filter)).forEach(item => {
            const div = document.createElement("div");
            div.className = "item-card";
            div.innerHTML = `<span>${item}</span>
                <div>
                    <button onclick="editItem('${item}')" style="background:#3b82f6; color:#fff; border:none; padding:5px; border-radius:5px; cursor:pointer;">تعديل</button>
                    <button onclick="deleteItem('${item}')" style="background:#ef4444; color:#fff; border:none; padding:5px; border-radius:5px; cursor:pointer;">حذف</button>
                </div>`;
            grid.appendChild(div);
        });
        localStorage.setItem("items", JSON.stringify(localItems));
    }

    function addCloudItemManual() {
        const val = document.getElementById("newItemName").value.trim();
        if(val && !localItems.includes(val)) {
            localItems.push(val);
            renderCloudItems();
            document.getElementById("newItemName").value = "";
            fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'add', item: val }) });
        }
    }

    // إضافة المادة للجدول
    function addItem() {
        const item = document.getElementById("itemSearch").value.trim();
        const qty = document.getElementById("qty").value.trim();
        if(!item || !qty) return alert("أكمل البيانات");

        const tbody = document.querySelector("#resultTable tbody");
        const row = tbody.insertRow(0);
        row.innerHTML = `<td style="text-align:right">${item}</td><td>${qty}</td>
            <td><button onclick="this.parentElement.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer; font-size:20px;">&times;</button></td>`;
        
        document.getElementById("itemSearch").value = "";
        document.getElementById("qty").value = "";
        document.getElementById("itemSearch").focus();
    }

    // البحث الذكي
    document.getElementById("itemSearch").oninput = function() {
        const val = this.value.toLowerCase();
        const resDiv = document.getElementById("results");
        resDiv.innerHTML = "";
        if(!val) return resDiv.classList.add('hidden');
        
        const matches = localItems.filter(i => i.includes(val));
        matches.forEach(item => {
            const d = document.createElement("div");
            d.className = "result-item"; d.textContent = item;
            d.onclick = () => { 
                document.getElementById("itemSearch").value = item;
                resDiv.classList.add('hidden');
                document.getElementById("qty").focus();
            };
            resDiv.appendChild(d);
        });
        resDiv.classList.remove('hidden');
    };

    // وظائف التصدير
    function prepareExport() {
        document.getElementById("expClient").innerText = document.getElementById("clientName").value || "عميل عام";
        document.getElementById("expDate").innerText = new Date().toLocaleDateString('ar-EG');
        const b = document.getElementById("expBody"); b.innerHTML = "";
        document.querySelectorAll("#resultTable tbody tr").forEach((r, i) => {
            b.innerHTML += `<tr><td>${i+1}</td><td style="text-align:right;">${r.cells[0].innerText}</td><td>${r.cells[1].innerText}</td></tr>`;
        });
    }

    async function exportAsImage() {
        if (document.querySelectorAll("#resultTable tbody tr").length === 0) return alert("الجدول فارغ!");
        prepareExport();
        const canvas = await html2canvas(document.getElementById("finalExportContainer"), { scale: 3, useCORS: true });
        const link = document.createElement('a');
        link.download = `فاتورة.png`; link.href = canvas.toDataURL(); link.click();
    }

    async function shareAsImage() {
        prepareExport();
        const canvas = await html2canvas(document.getElementById("finalExportContainer"), { scale: 3, useCORS: true });
        canvas.toBlob(async (blob) => {
            const file = new File([blob], 'فاتورة.png', { type: 'image/png' });
            if (navigator.share) await navigator.share({ files: [file], title: 'طلب مواد' });
            else alert("المشاركة غير مدعومة في هذا المتصفح، سيتم تحميل الصورة بدلاً من ذلك.");
        });
    }

    function exportPDF() {
        prepareExport();
        html2canvas(document.getElementById("finalExportContainer"), { scale: 2 }).then(canvas => {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
            pdf.save('فاتورة.pdf');
        });
    }

    function switchPage(p) { 
        document.getElementById("orderPage").classList.toggle("hidden", p !== 'order');
        document.getElementById("browsePage").classList.toggle("hidden", p !== 'browse');
        document.getElementById("tab1").classList.toggle("active", p === 'order');
        document.getElementById("tab2").classList.toggle("active", p === 'browse');
    }

    function startVoice(id) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ar-SA'; rec.start();
        rec.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript; };
    }

    function deleteItem(n) { if(confirm("حذف؟")) { localItems = localItems.filter(i => i !== n); renderCloudItems(); } }
    function editItem(o) { const n = prompt("تعديل:", o); if(n) { localItems[localItems.indexOf(o)] = n; renderCloudItems(); } }
    function clearTable() { if(confirm("مسح؟")) document.querySelector("#resultTable tbody").innerHTML = ""; }
</script>
</body>
</html>
