<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام آل وحيد - النسخة المطورة</title>

    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { 
            --primary: #c5a059; 
            --gold-gradient: linear-gradient(to bottom, #f1c40f, #b08d57);
            --bg: #0f172a; --text: #f1f5f9; --card: #1e293b; --border: #334155; 
            --dark: #000000; --danger: #ef4444; --success: #10b981;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        
        .brand-name {
            font-family: 'Aref Ruqaa', serif; font-size: 32px; font-weight: bold;
            background: var(--gold-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5));
            display: inline-block;
        }

        header { 
            background: linear-gradient(145deg, #000, #1a1a1a); padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000;
        }

        .nav-tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
        .nav-tabs button { flex: 1; padding: 15px; border: none; background: none; color: #94a3b8; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
        .nav-tabs button.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: rgba(176, 141, 87, 0.1); }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        input { 
            width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); 
            border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text); 
            box-sizing: border-box; font-size: 16px; outline: none; font-family: 'Cairo'; 
        }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; font-family: 'Cairo'; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin: 10px 0; font-size: 18px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: center; }

        .hidden { display: none !important; }

        /* --- تصميم الفاتورة عند التصدير --- */
        #finalExportContainer { 
            display: block; direction: rtl; padding: 40px; background-color: #ffffff !important; 
            width: 750px; position: fixed; left: -9999px; top: 0; 
        }
        #finalExportContainer * { color: #000000 !important; }

        .invoice-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 2px solid #000; }
        .invoice-table th, .invoice-table td { padding: 12px; font-size: 20px; font-weight: bold; text-align: center; border: 1px solid #000; }
        
        /* تنسيق الاسم والهاتف الجديد */
        .signature-box {
            margin-top: 60px;
            padding: 15px;
            border: 3px solid var(--primary);
            display: inline-block;
            float: left;
            border-radius: 15px;
            text-align: center;
            background: #fff !important;
        }
        .signature-box p { margin: 5px 0; font-family: 'Cairo'; }
        .sig-name { font-size: 24px; font-weight: 800; color: var(--primary) !important; }
        .sig-phone { font-size: 20px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <div class="card" style="width:320px; text-align:center; border: 2px solid var(--primary); background: #111;">
        <img src="https://i.ibb.co/4R44srhj/image.jpg" style="width: 110px; height:110px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 15px; object-fit: cover;">
        <div class="brand-name" style="font-size: 40px; margin-bottom: 10px;">ال وحيد</div>
        <input type="password" id="passInput" placeholder="الرمز (123)" style="text-align:center;" onkeydown="if(event.key==='Enter') checkPassword()">
        <button class="btn btn-main" onclick="checkPassword()">دخول للنظام</button>
    </div>
</div>

<div id="appContent" class="hidden">
    <header>
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="https://i.ibb.co/4R44srhj/image.jpg" style="width: 45px; height:45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary);">
            <div class="brand-name">ال وحيد</div>
        </div>
    </header>

    <div class="nav-tabs">
        <button id="tab1" class="active" onclick="switchPage('order')">تسجيل طلبية</button>
        <button id="tab2" onclick="switchPage('browse')">مخزن الأصناف</button>
    </div>

    <div class="container">
        <div id="orderPage">
            <div class="card">
                <input type="text" id="clientName" placeholder="اسم العميل..." onkeydown="if(event.key==='Enter') document.getElementById('itemSearch').focus()">
                <div style="position:relative;">
                    <input type="text" id="itemSearch" placeholder="ابحث عن مادة..." autocomplete="off">
                    <div id="results" class="results-box hidden" style="position:absolute; width:100%; background:var(--card); z-index:10; border:1px solid var(--primary); max-height:200px; overflow-y:auto;"></div>
                </div>
                <input type="number" id="qty" placeholder="الكمية المطلوبة" inputmode="numeric" onkeydown="if(event.key==='Enter') addItem()">
                <button class="btn btn-main" onclick="addItem()">➕ إضافة للجدول</button>

                <table id="resultTable">
                    <thead><tr><th>المادة</th><th>الكمية</th><th>حذف</th></tr></thead>
                    <tbody></tbody>
                </table>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                    <button class="btn" style="background:#25D366; color:white; grid-column: span 2;" onclick="shareAsImage()">🔗 مشاركة واتساب</button>
                    <button class="btn" style="background:var(--primary); color:white;" onclick="exportAsImage()">📸 حفظ صورة</button>
                    <button class="btn" style="background:#444; color:white;" onclick="clearTable()">🗑️ مسح الكل</button>
                </div>
            </div>
        </div>

        <div id="browsePage" class="hidden">
            <div class="card">
                <h3 style="color:var(--primary);">إدارة الأصناف</h3>
                <input type="text" id="newItemName" placeholder="أضف صنف جديد هنا..." onkeydown="if(event.key==='Enter') addCloudItemManual()">
                <button class="btn btn-main" onclick="addCloudItemManual()">حفظ صنف ✅</button>
                <div id="itemsGrid" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>
</div>

<div id="finalExportContainer">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #b08d57; padding-bottom: 15px; margin-bottom: 25px;">
        <img src="https://i.ibb.co/4R44srhj/image.jpg" crossOrigin="anonymous" style="width: 120px; height:120px; border-radius: 50%;">
        <div style="text-align: left;">
            <h1 style="margin: 0; color: #b08d57 !important; font-size: 55px; font-family: 'Aref Ruqaa', serif;">ال وحيد</h1>
            <p style="margin: 5px 0; font-size: 22px; font-weight: bold;">كشف طلب مواد </p>
        </div>
    </div>
    
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <div style="font-size: 24px;">السيد: <strong id="expClient"></strong></div>
        <div style="font-size: 22px;">التاريخ: <span id="expDate"></span></div>
    </div>

    <table class="invoice-table">
        <thead>
            <tr><th style="width: 10%;">م</th><th style="width: 65%;">الصنف</th><th style="width: 25%;">الكمية</th></tr>
        </thead>
        <tbody id="expBody"></tbody>
    </table>

    <div style="width: 100%; margin-top: 40px;">
        <div class="signature-box">
            <p class="sig-name">أ. أحمد وحيد</p>
            <p class="sig-phone">ت: 01007519016</p>
        </div>
    </div>
</div>

<script>
    let localItems = JSON.parse(localStorage.getItem("items")) || ["إسمنت", "حديد", "رمل"];

    function checkPassword() {
        if(document.getElementById("passInput").value === "123") {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("appContent").classList.remove("hidden");
        } else { alert("الرمز خطأ"); }
    }

    function addItem() {
        const item = document.getElementById("itemSearch").value;
        const qty = document.getElementById("qty").value;
        if(!item || !qty) return;

        const tbody = document.querySelector("#resultTable tbody");
        const row = tbody.insertRow(0);
        row.innerHTML = `<td>${item}</td><td>${qty}</td><td><button onclick="this.parentElement.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer;">✖</button></td>`;
        
        document.getElementById("itemSearch").value = "";
        document.getElementById("qty").value = "";
        document.getElementById("itemSearch").focus();
    }

    function prepareExport() {
        document.getElementById("expClient").innerText = document.getElementById("clientName").value || "عميل محترم";
        document.getElementById("expDate").innerText = new Date().toLocaleDateString('ar-EG');
        const b = document.getElementById("expBody"); b.innerHTML = "";
        document.querySelectorAll("#resultTable tbody tr").forEach((r, i) => {
            b.innerHTML += `<tr><td>${i+1}</td><td>${r.cells[0].innerText}</td><td>${r.cells[1].innerText}</td></tr>`;
        });
    }

    async function shareAsImage() {
        prepareExport();
        const canvas = await html2canvas(document.getElementById("finalExportContainer"), { scale: 3, useCORS: true });
        canvas.toBlob(blob => {
            const file = new File([blob], 'فاتورة.png', { type: 'image/png' });
            if (navigator.share) {
                navigator.share({ files: [file], title: 'فاتورة ال وحيد' });
            } else { exportAsImage(); }
        });
    }

    function exportAsImage() {
        prepareExport();
        html2canvas(document.getElementById("finalExportContainer"), { scale: 3, useCORS: true }).then(canvas => {
            const link = document.createElement('a');
            link.download = `فاتورة_${document.getElementById("clientName").value}.png`;
            link.href = canvas.toDataURL(); link.click();
        });
    }

    function switchPage(p) { 
        document.getElementById("orderPage").classList.toggle("hidden", p !== 'order');
        document.getElementById("browsePage").classList.toggle("hidden", p !== 'browse');
        document.getElementById("tab1").classList.toggle("active", p === 'order');
        document.getElementById("tab2").classList.toggle("active", p === 'browse');
    }

    function clearTable() { if(confirm("مسح الجدول؟")) document.querySelector("#resultTable tbody").innerHTML = ""; }
</script>

</body>
</html>
