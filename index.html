<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام ال وحيد - النسخة الاحترافية المحدثة</title>

    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { 
            --primary: #b08d57; 
            --gold-gradient: linear-gradient(to bottom, #f1c40f, #b08d57);
            --bg: #0f172a; 
            --text: #f1f5f9; 
            --card: #1e293b; 
            --border: #334155; 
            --dark: #000000; 
            --danger: #ef4444; 
            --edit: #3b82f6; 
            --share: #8b5cf6;
        }

        /* أنماط الأوضاع المختلفة */
        body.light-mode { --bg: #f1f5f9; --text: #0f172a; --card: #ffffff; --border: #cbd5e1; }
        body.gold-mode { --bg: #111; --text: #d4af37; --card: #222; --border: #b08d57; }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; overflow-x: hidden; }
        header { background: #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        
        .brand-name { font-family: 'Aref Ruqaa', serif; font-size: 32px; font-weight: bold; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; }

        /* لوحة التحكم الجانبية */
        .settings-panel {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%; 
            background: var(--card); border-right: 3px solid var(--primary); 
            z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }
        .settings-panel.open { left: 0; }
        .settings-panel h3 { color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        .nav-tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
        .nav-tabs button { flex: 1; padding: 15px; border: none; background: none; color: #64748b; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }
        .nav-tabs button.active { color: var(--primary); border-bottom: 4px solid var(--primary); background: rgba(176,141,87,0.1); }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; background: rgba(150,150,150,0.1); color: var(--text); font-family: 'Cairo'; font-size: 16px; }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; font-family: 'Cairo'; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin: 10px 0; font-size: 18px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: center; }

        #finalExportContainer { 
            display: block; direction: rtl; padding: 50px; background: white !important; 
            width: 800px; color: black !important; position: fixed; left: -9999px; top: 0; 
            height: auto; 
        }
        .invoice-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 2px solid black; }
        .invoice-table th, .invoice-table td { border: 1px solid black; padding: 12px; color: black !important; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode">

<div id="settingsPanel" class="settings-panel">
    <h3>إعدادات النظام ⚙️</h3>
    
    <div style="margin-bottom: 20px;">
        <label>🎨 مظهر التطبيق (Mode):</label>
        <select onchange="changeTheme(this.value)">
            <option value="dark-mode">الوضع الليلي (الافتراضي)</option>
            <option value="light-mode">الوضع الفاتح</option>
            <option value="gold-mode">الوضع الذهبي</option>
        </select>
    </div>

    <div style="margin-bottom: 20px;">
        <label>🖼️ شعار الفاتورة الجديد:</label>
        <input type="file" accept="image/*" onchange="updateLogo(this)">
        <small>اختر صورة لتظهر في ترويسة الفاتورة</small>
    </div>

    <div style="margin-bottom: 20px;">
        <label>📝 إضافات الفاتورة المطبوعة:</label>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
            <label style="font-weight: normal;"><input type="checkbox" id="showTotalCheck" checked onchange="toggleExtra('totalBox', this.checked)"> إظهار إجمالي الأصناف</label>
            <label style="font-weight: normal;"><input type="checkbox" id="showSignCheck" checked onchange="toggleExtra('signBox', this.checked)"> إظهار التوقيع والختم</label>
        </div>
    </div>

    <button class="btn btn-main" style="margin-top:30px" onclick="toggleSettings()">إغلاق وحفظ الإعدادات</button>
</div>

<header>
    <div style="display: flex; align-items: center; gap: 12px;">
        <img id="appLogo" src="https://i.ibb.co/4R44srhj/image.jpg" style="width: 45px; height:45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover;">
        <div class="brand-name">ال وحيد</div>
    </div>
    <div style="font-size: 24px; cursor: pointer; color: var(--primary);" onclick="toggleSettings()">⚙️</div>
</header>

<div class="nav-tabs">
    <button id="t1" class="active" onclick="switchTab('order')">تسجيل طلبية</button>
    <button id="t2" onclick="switchTab('items')">إدارة المخزن</button>
</div>

<div class="container">
    <div id="orderSection">
        <div class="card">
            <input type="text" id="custName" placeholder="اسم العميل...">
            <input type="text" id="searchBar" placeholder="ابحث عن مادة في المخزن..." autocomplete="off">
            <input type="number" id="itemQty" placeholder="الكمية المطلوبة" onkeydown="if(event.key==='Enter') pushToTable()">
            <button class="btn btn-main" onclick="pushToTable()">➕ إضافة للجدول (Enter)</button>
            
            <table id="mainTable" style="margin-top:20px;">
                <thead><tr style="border-bottom:2px solid var(--border)"><th>الصنف</th><th>الكمية</th><th>حذف</th></tr></thead>
                <tbody></tbody>
            </table>

            <div style="margin-top:20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                <button class="btn" style="background:#8b5cf6; color:white; grid-column: span 2;" onclick="generateAction('share')">🔗 مشاركة واتساب فورية</button>
                <button class="btn" style="background:#25D366; color:white;" onclick="generateAction('image')">📸 حفظ كصورة</button>
                <button class="btn" style="background:#b08d57; color:white;" onclick="generateAction('pdf')">📄 تصدير PDF</button>
                <button class="btn" style="background:#64748b; color:white; grid-column: span 2;" onclick="clearAll()">🗑️ مسح الجدول بالكامل</button>
            </div>
        </div>
    </div>

    <div id="itemsSection" class="hidden">
        <div class="card">
            <h3 style="color:var(--primary)">إدارة الأصناف</h3>
            <input type="text" id="newStoreItem" placeholder="أدخل اسم صنف جديد للتخزين...">
            <button class="btn btn-main" onclick="saveToStore()">حفظ في المخزن</button>
            <div id="storeGrid" style="margin-top:20px; display: grid; gap: 8px;"></div>
        </div>
    </div>
</div>

<div id="finalExportContainer">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #b08d57; padding-bottom: 15px; margin-bottom: 25px;">
        <img id="invoiceLogo" src="https://i.ibb.co/4R44srhj/image.jpg" crossOrigin="anonymous" style="width: 130px; height:130px; border-radius: 50%; object-fit: cover;">
        <div style="text-align: left;">
            <h1 style="margin: 0; color: #b08d57; font-size: 55px; font-family: 'Aref Ruqaa', serif;">ال وحيد</h1>
            <p style="margin: 5px 0; color: black; font-size: 22px; font-weight: bold;">لتوريدات ومواد البناء والتعمير</p>
        </div>
    </div>
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <div style="font-size: 24px; color: black;">السيد: <strong id="outCust"></strong></div>
        <div style="font-size: 22px; color: black;">التاريخ: <span id="outDate"></span></div>
    </div>
    <table class="invoice-table">
        <thead><tr><th>م</th><th style="text-align:right">الصنف</th><th>الكمية</th></tr></thead>
        <tbody id="outBody"></tbody>
    </table>
    
    <div id="totalBox" style="text-align: right; margin-top: 10px;">
        <div style="margin-top:15px; font-size:22px; font-weight:bold; border:2px solid black; padding:10px; display:inline-block;">إجمالي الأصناف: <span id="outTotal">0</span></div>
    </div>

    <div id="signBox" style="margin-top: 50px; display: flex; justify-content: space-between; padding: 0 30px;">
        <p style="font-weight: bold; font-size: 22px; color: black; border-bottom: 2px solid black;">توقيع المستلم</p>
        <p style="font-weight: bold; font-size: 22px; color: black; border-bottom: 2px solid black;">الختم الرسمي</p>
    </div>
</div>

<script>
    let inventory = JSON.parse(localStorage.getItem('inv')) || ["حديد عز 12مم", "إسمنت لافارج", "رمل حرش"];
    let currentOrder = [];

    function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }
    function changeTheme(theme) { document.body.className = theme; localStorage.setItem('theme', theme); }

    function updateLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                // تحديث الشعار في كل مكان في التطبيق
                document.getElementById('appLogo').src = e.target.result;
                document.getElementById('invoiceLogo').src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function toggleExtra(elementId, isVisible) {
        document.getElementById(elementId).classList.toggle("hidden", !isVisible);
    }

    function pushToTable() {
        const name = document.getElementById('searchBar').value;
        const qty = document.getElementById('itemQty').value;
        if(!name || !qty) return;
        currentOrder.push({name, qty});
        renderTable();
        document.getElementById('searchBar').value = ''; document.getElementById('itemQty').value = ''; document.getElementById('searchBar').focus();
    }

    function renderTable() {
        const tbody = document.querySelector('#mainTable tbody');
        tbody.innerHTML = currentOrder.map((item, index) => `
            <tr><td>${item.name}</td><td><strong>${item.qty}</strong></td><td><button onclick="removeItem(${index})" style="background:none; border:none; color:#ef4444; font-size:18px;">✖</button></td></tr>
        `).join('');
    }

    function removeItem(idx) { currentOrder.splice(idx, 1); renderTable(); }
    function clearAll() { if(confirm("مسح الطلبية بالكامل؟")) { currentOrder = []; renderTable(); } }

    function switchTab(tab) {
        document.getElementById('orderSection').classList.toggle('hidden', tab !== 'order');
        document.getElementById('itemsSection').classList.toggle('hidden', tab !== 'items');
        document.getElementById('t1').classList.toggle('active', tab === 'order');
        document.getElementById('t2').classList.toggle('active', tab === 'items');
        if(tab === 'items') renderStore();
    }

    function saveToStore() {
        const val = document.getElementById('newStoreItem').value;
        if(val && !inventory.includes(val)) {
            inventory.push(val); localStorage.setItem('inv', JSON.stringify(inventory)); renderStore(); document.getElementById('newStoreItem').value = '';
        }
    }

    function renderStore() {
        const grid = document.getElementById('storeGrid');
        grid.innerHTML = inventory.map(item => `<div style="background:var(--card); padding:10px; border-radius:8px; border:1px solid var(--border); display:flex; justify-content:space-between"><span>${item}</span><span onclick="deleteFromStore('${item}')" style="color:red; cursor:pointer">حذف</span></div>`).join('');
    }

    function deleteFromStore(item) { inventory = inventory.filter(i => i !== item); localStorage.setItem('inv', JSON.stringify(inventory)); renderStore(); }

    async function generateAction(type) {
        if(currentOrder.length === 0) return alert("الجدول فارغ!");
        document.getElementById('outCust').innerText = document.getElementById('custName').value || "بدون اسم";
        document.getElementById('outDate').innerText = new Date().toLocaleDateString('ar-EG');
        document.getElementById('outTotal').innerText = currentOrder.length;
        document.getElementById('outBody').innerHTML = currentOrder.map((item, i) => `<tr><td>${i+1}</td><td style="text-align:right">${item.name}</td><td>${item.qty}</td></tr>`).join('');
        const canvas = await html2canvas(document.getElementById('finalExportContainer'), { scale: 3, useCORS: true });
        
        if(type === 'image') {
            const link = document.createElement('a'); link.download = `فاتورة.png`; link.href = canvas.toDataURL(); link.click();
        } else if(type === 'pdf') {
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4'); pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width); pdf.save("الوحيد.pdf");
        } else if(type === 'share') {
            canvas.toBlob(async blob => {
                const file = new File([blob], 'invoice.png', { type: 'image/png' });
                if (navigator.share) await navigator.share({ files: [file] });
            });
        }
    }

    window.onload = () => { changeTheme(localStorage.getItem('theme') || 'dark-mode'); renderStore(); };
</script>

</body>
</html>
