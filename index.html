<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام ال وحيد - النسخة المطورة A4</title>

    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { 
            --primary: #b08d57; 
            --gold-gradient: linear-gradient(to bottom, #f1c40f, #b08d57);
            --bg: #0f172a; --text: #f1f5f9; --card: #1e293b; --border: #334155; 
            --dark: #000000; --danger: #ef4444; --edit: #3b82f6; --share: #8b5cf6;
            --success: #10b981;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        
        .brand-name {
            font-family: 'Aref Ruqaa', serif; font-size: 32px; font-weight: bold;
            background: var(--gold-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5));
            display: inline-block;
        }

        header { 
            background: linear-gradient(145deg, #000, #1a1a1a); padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000;
        }

        .nav-tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
        .nav-tabs button { flex: 1; padding: 15px; border: none; background: none; color: #94a3b8; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
        .nav-tabs button.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: rgba(176, 141, 87, 0.1); }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        .search-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
        
        input { 
            width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); 
            border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text); 
            box-sizing: border-box; font-size: 16px; outline: none; font-family: 'Cairo'; 
        }
        
        .voice-btn { position: absolute; left: 10px; background: none; border: none; color: var(--primary); font-size: 20px; cursor: pointer; padding: 5px; z-index: 5; }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; font-family: 'Cairo'; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin: 10px 0; font-size: 18px; }
        
        .grid-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .full-width { grid-column: span 2; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: center; }

        .results-box { position: absolute; background: var(--card); border: 1px solid var(--primary); width: 100%; z-index: 1100; max-height: 250px; overflow-y: auto; border-radius: 8px; top: 55px; }
        .result-item { padding: 15px; cursor: pointer; border-bottom: 1px solid var(--border); text-align: right; }

        .hidden { display: none !important; }
        .item-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; text-align: right; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* --- تنسيق الطباعة A4 المطور --- */
        #finalExportContainer { 
            direction: rtl; 
            background-color: #ffffff !important; 
            width: 210mm; 
            min-height: 297mm;
            color: #000000 !important; 
            position: fixed; 
            left: -9999px; 
            top: 0; 
            padding: 15mm;
            box-sizing: border-box;
        }
        #finalExportContainer * { color: #000000 !important; }

        .invoice-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 2px solid #000; }
        .invoice-table th { 
            background-color: #f1f1f1 !important; 
            padding: 12px; font-size: 20px; font-weight: bold; 
            border: 1px solid #000; 
        }
        .invoice-table td { 
            padding: 10px; font-size: 19px; border: 1px solid #000; text-align: center;
        }
    </style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <div class="card" style="width:320px; text-align:center; border: 2px solid var(--primary); background: #111;">
        <img src="https://i.ibb.co/4R44srhj/image.jpg" style="width: 110px; height:110px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 15px; object-fit: cover;">
        <div class="brand-name" style="font-size: 40px; margin-bottom: 10px;">ال وحيد</div>
        <input type="password" id="passInput" placeholder="الرمز (123)" style="text-align:center;" onkeydown="if(event.key==='Enter') checkPassword()">
        <button class="btn btn-main" onclick="checkPassword()">دخول للنظام</button>
    </div>
</div>

<div id="appContent" class="hidden">
    <header>
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="https://i.ibb.co/4R44srhj/image.jpg" style="width: 45px; height:45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary);">
            <div class="brand-name">ال وحيد</div>
        </div>
    </header>

    <div class="nav-tabs">
        <button id="tab1" class="active" onclick="switchPage('order')">تسجيل طلبية</button>
        <button id="tab2" onclick="switchPage('browse')">مخزن الأصناف</button>
    </div>

    <div class="container">
        <div id="orderPage">
            <div class="card">
                <input type="text" id="clientName" placeholder="اسم العميل...">
                <input type="text" id="orderNotes" placeholder="ملاحظات العميل (اختياري)...">
                
                <div class="search-wrapper">
                    <input type="text" id="itemSearch" placeholder="ابحث عن مادة..." autocomplete="off">
                    <button class="voice-btn" onclick="startVoice('itemSearch')">🎤</button>
                    <div id="results" class="results-box hidden"></div>
                </div>
                <input type="number" id="qty" placeholder="الكمية المطلوبة" inputmode="numeric" onkeydown="if(event.key==='Enter') addItem()">
                <button class="btn btn-main" onclick="addItem()">➕ إضافة للجدول</button>

                <table id="resultTable">
                    <thead><tr><th>المادة</th><th>الكمية</th><th>حذف</th></tr></thead>
                    <tbody></tbody>
                </table>

                <div class="grid-buttons">
                    <button class="btn full-width" style="background:var(--share); color:white;" onclick="shareAsImage()">🔗 مشاركة مباشرة (واتساب)</button>
                    <button class="btn" style="background:#25D366; color:white;" onclick="exportAsImage()">📸 حفظ صورة</button>
                    <button class="btn" style="background:var(--primary); color:white;" onclick="exportPDF()">📄 تصدير PDF</button>
                    <button class="btn full-width" style="background:#444; color:white;" onclick="clearTable()">🗑️ مسح الجدول</button>
                </div>
            </div>
        </div>

        <div id="browsePage" class="hidden">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="color:var(--primary); margin:0;">إدارة الأصناف</h3>
                    <button id="syncBtn" class="btn" style="background:var(--success); color:white; padding: 6px 12px; font-size: 13px;" onclick="syncFromCloud()">
                        🔄 مزامنة السحاب
                    </button>
                </div>
                <div class="search-wrapper">
                    <input type="text" id="newItemName" placeholder="اكتب للبحث أو إضافة صنف جديد..." oninput="renderCloudItems(this.value)">
                    <button class="voice-btn" onclick="startVoice('newItemName', () => renderCloudItems(document.getElementById('newItemName').value))">🎤</button>
                </div>
                <button class="btn btn-main" onclick="addCloudItemManual()">حفظ كصنف جديد ✅</button>
                <div id="itemsGrid" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>
</div>

<div id="finalExportContainer">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #b08d57; padding-bottom: 15px; margin-bottom: 25px;">
        <img src="https://i.ibb.co/4R44srhj/image.jpg" crossOrigin="anonymous" style="width: 120px; height:120px; border-radius: 50%; object-fit: cover;">
        <div style="text-align: left;">
            <h1 style="margin: 0; color: #b08d57 !important; font-size: 48px; font-family: 'Aref Ruqaa', serif;">كشف طلب مواد</h1>
            <p style="margin: 5px 0; font-size: 20px; font-weight: bold;">مؤسسة ال وحيد للتجارة</p>
        </div>
    </div>
    
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap;">
        <div style="font-size: 22px;">السيد: <strong id="expClient"></strong></div>
        <div style="font-size: 20px;">التاريخ: <span id="expDate"></span></div>
        <div id="expNotesWrapper" style="width: 100%; margin-top: 10px; font-size: 18px; border-top: 1px dashed #ccc; padding-top: 5px;">
            ملاحظات: <span id="expNotes"></span>
        </div>
    </div>

    <table class="invoice-table">
        <thead>
            <tr><th style="width: 10%;">م</th><th style="width: 65%; text-align: right; padding-right:15px;">الصنف</th><th style="width: 25%;">الكمية</th></tr>
        </thead>
        <tbody id="expBody"></tbody>
    </table>

    <div style="margin-top: 50px; display: flex; justify-content: flex-end;">
        <div style="text-align: center; border-top: 2px solid #b08d57; padding-top: 10px; min-width: 250px;">
            <p style="margin: 0; font-size: 32px; font-family: 'Aref Ruqaa', serif;">ال وحيد</p>
            <p style="margin: 0; font-size: 18px; direction: ltr;">0100XXXXXXX</p>
        </div>
    </div>
</div>

<script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycby94J0O_uH3WIFzLoelLDAVMagTZEGbo0LAfbVaVR_52wgSoCtbqJ-6ZHjbnUBujlfc/exec';
    let localItems = JSON.parse(localStorage.getItem("items")) || ["إسمنت", "حديد", "رمل"];

    function checkPassword() {
        if(document.getElementById("passInput").value === "123") {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("appContent").classList.remove("hidden");
            renderCloudItems();
        } else { alert("الرمز خطأ"); }
    }

    // مزامنة الأصناف
    async function syncFromCloud() {
        const btn = document.getElementById("syncBtn");
        try {
            btn.innerText = "جاري التحميل...";
            const response = await fetch(GOOGLE_URL);
            const cloudData = await response.json();
            if (Array.isArray(cloudData)) {
                localItems = [...new Set([...localItems, ...cloudData])];
                localStorage.setItem("items", JSON.stringify(localItems));
                renderCloudItems();
                alert("تمت المزامنة!");
            }
        } catch (e) { alert("خطأ في المزامنة"); }
        finally { btn.innerText = "🔄 مزامنة السحاب"; }
    }

    function renderCloudItems(filter = "") {
        const grid = document.getElementById("itemsGrid");
        grid.innerHTML = "";
        localItems.filter(i => i.includes(filter)).forEach(item => {
            const div = document.createElement("div");
            div.className = "item-card";
            div.innerHTML = `<span>${item}</span>
                <div>
                    <button style="background:var(--edit); color:white; border:none; padding:5px; border-radius:4px;" onclick="editItem('${item}')">تعديل</button>
                    <button style="background:var(--danger); color:white; border:none; padding:5px; margin-right:5px; border-radius:4px;" onclick="deleteItem('${item}')">حذف</button>
                </div>`;
            grid.appendChild(div);
        });
    }

    function saveItemToCloud(name) {
        name = name.trim();
        if(!name || localItems.includes(name)) return false;
        localItems.push(name);
        localStorage.setItem("items", JSON.stringify(localItems));
        fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'add', item: name }) });
        renderCloudItems();
        return true;
    }

    function addItem() {
        const item = document.getElementById("itemSearch").value.trim();
        const qty = document.getElementById("qty").value;
        if(!item || !qty) return;
        saveItemToCloud(item);
        const row = document.querySelector("#resultTable tbody").insertRow(0);
        row.innerHTML = `<td style="text-align:right">${item}</td><td style="font-weight:bold">${qty}</td><td><button onclick="this.parentElement.parentElement.remove()" style="color:red; background:none; border:none; font-size:20px;">✖</button></td>`;
        document.getElementById("itemSearch").value = "";
        document.getElementById("qty").value = "";
        document.getElementById("itemSearch").focus();
    }

    function prepareExport() {
        document.getElementById("expClient").innerText = document.getElementById("clientName").value || "بدون اسم";
        document.getElementById("expDate").innerText = new Date().toLocaleDateString('ar-EG');
        const notes = document.getElementById("orderNotes").value;
        document.getElementById("expNotesWrapper").style.display = notes ? "block" : "none";
        document.getElementById("expNotes").innerText = notes;
        
        const b = document.getElementById("expBody");
        b.innerHTML = "";
        document.querySelectorAll("#resultTable tbody tr").forEach((r, i) => {
            b.innerHTML += `<tr><td>${i+1}</td><td style="text-align:right; padding-right:15px;">${r.cells[0].innerText}</td><td>${r.cells[1].innerText}</td></tr>`;
        });
    }

    // وظيفة تصدير PDF مع تقسيم الصفحات تلقائياً
    async function exportPDF() {
        if (document.querySelectorAll("#resultTable tbody tr").length === 0) return alert("الجدول فارغ!");
        prepareExport();
        const element = document.getElementById("finalExportContainer");
        
        // إظهار مؤقت للحسابات
        element.style.left = "0";
        element.style.zIndex = "-1";

        try {
            const canvas = await html2canvas(element, { scale: 2, useCORS: true });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();
            const imgHeight = (canvas.height * pdfWidth) / canvas.width;
            
            let heightLeft = imgHeight;
            let position = 0;

            pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, imgHeight);
            heightLeft -= pdfHeight;

            while (heightLeft >= 0) {
                position = heightLeft - imgHeight;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, imgHeight);
                heightLeft -= pdfHeight;
            }

            pdf.save(`طلب_${document.getElementById("clientName").value}.pdf`);
        } catch (err) { alert("حدث خطأ أثناء التصدير"); }
        finally { element.style.left = "-9999px"; }
    }

    async function shareAsImage() {
        prepareExport();
        const element = document.getElementById("finalExportContainer");
        element.style.left = "0";
        const canvas = await html2canvas(element, { scale: 2, useCORS: true });
        element.style.left = "-9999px";
        canvas.toBlob(async (blob) => {
            const file = new File([blob], 'invoice.png', { type: 'image/png' });
            if (navigator.share) await navigator.share({ files: [file], title: 'فاتورة' });
            else exportAsImage();
        });
    }

    function exportAsImage() {
        prepareExport();
        const element = document.getElementById("finalExportContainer");
        element.style.left = "0";
        html2canvas(element, { scale: 2, useCORS: true }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'order.png';
            link.href = canvas.toDataURL();
            link.click();
            element.style.left = "-9999px";
        });
    }

    // وظائف البحث والتنقل
    document.getElementById("itemSearch").oninput = function() {
        const val = this.value;
        const resDiv = document.getElementById("results");
        resDiv.innerHTML = "";
        if(!val) return resDiv.classList.add('hidden');
        const matches = localItems.filter(i => i.includes(val));
        matches.forEach(item => {
            const d = document.createElement("div");
            d.className = "result-item"; d.textContent = item;
            d.onclick = () => { 
                document.getElementById("itemSearch").value = item; 
                resDiv.classList.add('hidden'); 
                document.getElementById("qty").focus(); 
            };
            resDiv.appendChild(d);
        });
        resDiv.classList.remove('hidden');
    };

    function startVoice(id, cb) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ar-SA'; rec.start();
        rec.onresult = (e) => { 
            document.getElementById(id).value = e.results[0][0].transcript; 
            if(cb) cb(); 
        };
    }

    function switchPage(p) {
        document.getElementById("orderPage").classList.toggle("hidden", p !== 'order');
        document.getElementById("browsePage").classList.toggle("hidden", p !== 'browse');
        document.getElementById("tab1").classList.toggle("active", p === 'order');
        document.getElementById("tab2").classList.toggle("active", p === 'browse');
    }

    function clearTable() { if(confirm("مسح الكل؟")) document.querySelector("#resultTable tbody").innerHTML = ""; }
    
    window.onclick = (e) => { if(!e.target.matches('#itemSearch')) document.getElementById("results").classList.add('hidden'); };
</script>

</body>
</html>
