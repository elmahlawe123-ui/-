<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبات المحلاوي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-add { background: #2563eb; color: white; }
        .btn-img { background: #25d366; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        
        /* تصميم الفاتورة عند التصوير */
        #captureArea { position: absolute; left: -9999px; width: 400px; background: white; padding: 25px; color: black; }
        #captureArea table { width: 100%; border: 2px solid black; }
        #captureArea th, #captureArea td { border: 1px solid black; padding: 10px; }

        /* نافذة العرض المنبثقة */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 15px; border-radius: 15px; width: 90%; text-align: center; }
        .modal-content img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:#2563eb;">📦 مسجل المحلاوي</h2>
    <input type="text" id="cName" placeholder="اسم العميل">
    <input type="text" id="iName" placeholder="اسم المادة">
    <input type="number" id="iQty" placeholder="الكمية">
    <button class="btn btn-add" onclick="addRow()">+ إضافة للجدول</button>

    <table id="mainTable">
        <thead><tr><th>المادة</th><th>الكمية</th><th>X</th></tr></thead>
        <tbody></tbody>
    </table>
    <button class="btn btn-img" onclick="generateImage()">🖼️ استخراج صورة للواتساب</button>
</div>

<div id="imgModal" class="modal">
    <div class="modal-content">
        <h3>جاهز للإرسال</h3>
        <p style="font-size:12px; color:red;">اضغط مطولاً على الصورة لحفظها</p>
        <div id="imgPlaceholder"></div>
        <button class="btn btn-add" style="background:#444" onclick="closeModal()">رجوع</button>
    </div>
</div>

<div id="captureArea">
    <h2 style="text-align:center;">طلب بضاعة</h2>
    <p><b>العميل:</b> <span id="outClient"></span></p>
    <p><b>التاريخ:</b> <span id="outDate"></span></p>
    <table>
        <thead><tr><th>المادة</th><th>الكمية</th></tr></thead>
        <tbody id="outBody"></tbody>
    </table>
    <p style="text-align:center; margin-top:30px;">المحلاوي ستور - شكراً لتعاملكم</p>
</div>

<script>
function addRow() {
    const name = document.getElementById("iName").value;
    const qty = document.getElementById("iQty").value;
    if(!name || !qty) return alert("أكمل البيانات");
    const row = document.querySelector("#mainTable tbody").insertRow();
    row.innerHTML = `<td>${name}</td><td>${qty}</td><td><button onclick="this.parentElement.parentElement.remove()" style="color:red; background:none; border:none;">X</button></td>`;
    document.getElementById("iName").value = ""; document.getElementById("iQty").value = "";
}

function generateImage() {
    document.getElementById("outClient").innerText = document.getElementById("cName").value || "بدون اسم";
    document.getElementById("outDate").innerText = new Date().toLocaleDateString('ar-EG');
    const outBody = document.getElementById("outBody");
    outBody.innerHTML = "";
    document.querySelectorAll("#mainTable tbody tr").forEach(r => {
        const nr = outBody.insertRow();
        nr.innerHTML = `<td>${r.cells[0].innerText}</td><td>${r.cells[1].innerText}</td>`;
    });

    const area = document.getElementById("captureArea");
    area.style.left = "0px";
    html2canvas(area).then(canvas => {
        document.getElementById("imgPlaceholder").innerHTML = `<img src="${canvas.toDataURL()}" />`;
        document.getElementById("imgModal").style.display = "flex";
        area.style.left = "-9999px";
    });
}
function closeModal() { document.getElementById("imgModal").style.display = "none"; }
</script>
</body>
</html>
