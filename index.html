<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة أصناف المحلاوي السحابية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #b08d57; --bg: #0f172a; --text: #f1f5f9; --card: #1e293b; --border: #334155; --dark: #000000; --danger: #ef4444; --edit: #3b82f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        header { background: var(--dark); padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text); box-sizing: border-box; font-size: 16px; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; }
        .manage-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .item-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-sm { padding: 8px 12px; border-radius: 5px; border: none; cursor: pointer; color: white; margin-right: 5px; }
        .loading { text-align: center; color: var(--primary); font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; color:var(--primary);">قائمة أصناف المحلاوي (Cloud)</h2>
</header>

<div class="container">
    <div class="card">
        <h3>إضافة صنف جديد للسحابة</h3>
        <input type="text" id="newItemName" placeholder="اكتب اسم الصنف هنا...">
        <button class="btn-main" onclick="addItemToCloud()">حفظ في جوجل شيت</button>
    </div>

    <div class="card">
        <h3>الأصناف الحالية</h3>
        <div id="loader" class="loading hidden">جاري المزامنة مع جوجل...</div>
        <div id="itemsList" class="manage-grid"></div>
    </div>
</div>

<script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbwOAEcgkBdhKTclFaWuU1Dz43Y6GgZloEUpKz1sAimc0zYc1-INqJwNgFdIOLdlL8hD/exec';

    // جلب الأصناف عند فتح التطبيق
    window.onload = fetchItems;

    async function fetchItems() {
        showLoader(true);
        try {
            // ملاحظة: الـ GET يحتاج دالة doGet في السكريبت، لكننا سنستخدم POST كأكشن للسهولة
            const response = await fetch(GOOGLE_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'get' })
            });
            // إذا كان الـ mode no-cors لن نستطيع قراءة الاستجابة مباشرة، 
            // لذا يفضل أن يكون doGet متاحاً، لكن سنعتمد على التحديث اليدوي هنا.
        } catch(e) { console.log(e); }
        
        // لمحاكاة العرض وتجربة الواجهة (ستظهر الأصناف فور إضافتها)
        renderLocalItems();
        showLoader(false);
    }

    function renderLocalItems() {
        const list = document.getElementById("itemsList");
        let items = JSON.parse(localStorage.getItem("cloud_items_backup")) || ["إسمنت", "حديد", "رمل"];
        list.innerHTML = "";
        items.forEach(item => {
            const div = document.createElement("div");
            div.className = "item-card";
            div.innerHTML = `
                <span style="font-size:18px;">${item}</span>
                <div>
                    <button class="btn-sm" style="background:var(--edit)" onclick="editItem('${item}')">✏️</button>
                    <button class="btn-sm" style="background:var(--danger)" onclick="deleteItem('${item}')">🗑️</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    async function addItemToCloud() {
        const name = document.getElementById("newItemName").value.trim();
        if(!name) return;

        showLoader(true);
        await fetch(GOOGLE_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: 'add', item: name })
        });

        let items = JSON.parse(localStorage.getItem("cloud_items_backup")) || [];
        items.push(name);
        localStorage.setItem("cloud_items_backup", JSON.stringify(items));
        
        document.getElementById("newItemName").value = "";
        renderLocalItems();
        showLoader(false);
    }

    async function deleteItem(name) {
        if(!confirm(`هل تريد حذف ${name} من السحابة؟`)) return;
        
        showLoader(true);
        await fetch(GOOGLE_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: 'delete', item: name })
        });

        let items = JSON.parse(localStorage.getItem("cloud_items_backup")) || [];
        items = items.filter(i => i !== name);
        localStorage.setItem("cloud_items_backup", JSON.stringify(items));
        
        renderLocalItems();
        showLoader(false);
    }

    async function editItem(oldName) {
        const newName = prompt("الاسم الجديد للصنف:", oldName);
        if(!newName || newName === oldName) return;

        showLoader(true);
        await fetch(GOOGLE_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: 'edit', item: oldName, newItemName: newName })
        });

        let items = JSON.parse(localStorage.getItem("cloud_items_backup")) || [];
        const index = items.indexOf(oldName);
        if(index !== -1) items[index] = newName;
        localStorage.setItem("cloud_items_backup", JSON.stringify(items));
        
        renderLocalItems();
        showLoader(false);
    }

    function showLoader(show) {
        document.getElementById("loader").classList.toggle("hidden", !show);
    }
</script>
</body>
</html>
