<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام المحلاوي - V 3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --gold:        #c9a84c;
            --gold-light:  #e8c97a;
            --gold-dim:    #8a6830;
            --gold-glow:   rgba(201,168,76,0.18);
            --bg:          #080c14;
            --bg2:         #0d1420;
            --bg3:         #111927;
            --card:        #131d2e;
            --card2:       #172030;
            --border:      #1e2e46;
            --border-gold: rgba(201,168,76,0.3);
            --text:        #e8eef7;
            --text-muted:  #6b88aa;
            --danger:      #e05252;
            --edit:        #4a90d9;
            --share:       #7c5cbf;
            --success:     #3dba8c;
            --pdf:         #d95c3a;
            --radius:      14px;
            --radius-sm:   8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        /* ─── Noise texture overlay ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* ─── Brand ─── */
        .brand-name {
            font-family: 'Aref Ruqaa', serif;
            font-size: 30px;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dim) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(201,168,76,0.4));
            display: inline-block;
            letter-spacing: 1px;
        }

        /* ─── Header ─── */
        header {
            background: linear-gradient(180deg, #060a10 0%, #0a1220 100%);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-gold);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0,0,0,0.6);
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .header-logo {
            width: 44px; height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold-dim);
            box-shadow: 0 0 12px rgba(201,168,76,0.3);
        }

        .version-badge {
            font-size: 10px;
            color: var(--gold-dim);
            background: rgba(201,168,76,0.08);
            border: 1px solid var(--border-gold);
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        /* ─── Nav Tabs ─── */
        .nav-tabs {
            display: flex;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 72px;
            z-index: 999;
        }

        .nav-tabs button {
            flex: 1;
            padding: 14px 8px;
            border: none;
            background: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            font-family: 'Tajawal';
            font-size: 13px;
            transition: all 0.25s ease;
            position: relative;
            letter-spacing: 0.3px;
        }

        .nav-tabs button::after {
            content: '';
            position: absolute;
            bottom: 0; left: 20%; right: 20%;
            height: 2px;
            background: var(--gold);
            border-radius: 2px 2px 0 0;
            transform: scaleX(0);
            transition: transform 0.25s ease;
        }

        .nav-tabs button.active {
            color: var(--gold);
            background: linear-gradient(180deg, transparent, rgba(201,168,76,0.06));
        }

        .nav-tabs button.active::after {
            transform: scaleX(1);
        }

        /* ─── Container ─── */
        .container {
            padding: 18px 15px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* ─── Cards ─── */
        .card {
            background: var(--card);
            padding: 22px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 18px;
            position: relative;
            /* overflow:hidden removed — was clipping the search dropdown */
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.25), transparent);
            border-radius: var(--radius) var(--radius) 0 0;
            pointer-events: none;
            z-index: 1;
        }

        .card-title {
            color: var(--gold);
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ─── Inputs ─── */
        .input-wrapper {
            position: relative;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg3);
            color: var(--text);
            font-size: 15px;
            outline: none;
            font-family: 'Tajawal';
            transition: all 0.2s ease;
        }

        input::placeholder { color: var(--text-muted); font-size: 14px; }

        input:focus {
            border-color: var(--gold-dim);
            background: rgba(201,168,76,0.05);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
        }

        .voice-btn {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gold-dim);
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            z-index: 5;
            transition: color 0.2s;
        }
        .voice-btn:hover { color: var(--gold); }

        /* ─── Buttons ─── */
        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: all 0.2s ease;
            font-family: 'Tajawal';
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .btn:active { transform: scale(0.97); }

        .btn-main {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
            color: #fff;
            width: 100%;
            margin: 10px 0;
            font-size: 16px;
            padding: 14px;
            box-shadow: 0 4px 20px rgba(201,168,76,0.25);
            position: relative;
            overflow: hidden;
        }

        .btn-main::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
            transition: left 0.5s ease;
        }

        .btn-main:hover::before { left: 150%; }
        .btn-main:hover { box-shadow: 0 6px 25px rgba(201,168,76,0.4); }

        /* ─── Action Grid ─── */
        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 16px;
        }

        .full-width { grid-column: span 2; }

        .btn-action {
            border-radius: var(--radius-sm);
            padding: 13px 10px;
            font-size: 13px;
        }

        /* ─── Table ─── */
        .table-wrapper {
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border);
            margin-top: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead { background: linear-gradient(135deg, #0a1118, #0f1928); }

        th {
            padding: 12px 8px;
            color: var(--gold);
            font-weight: 700;
            text-align: center;
            border-bottom: 1px solid var(--border-gold);
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            transition: background 0.15s;
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: rgba(201,168,76,0.04); }
        tbody tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
        tbody tr:nth-child(even):hover td { background: rgba(201,168,76,0.05); }

        td:nth-child(2) { text-align: right; padding-right: 14px; }
        #resultTable td:nth-child(3) { font-weight: 700; color: var(--gold-light); }

        .row-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px; height: 24px;
            background: rgba(201,168,76,0.12);
            border-radius: 50%;
            font-size: 11px;
            color: var(--gold-dim);
            font-weight: 700;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 6px;
            border-radius: 4px;
            transition: all 0.15s;
            opacity: 0.7;
        }
        .action-btn:hover { opacity: 1; transform: scale(1.1); }
        .action-btn.edit { color: var(--edit); }
        .action-btn.del { color: var(--danger); }

        /* ─── Dropdown Results ─── */
        .results-box {
            position: absolute;
            background: var(--card2);
            border: 1px solid var(--border-gold);
            width: 100%;
            z-index: 1100;
            max-height: 240px;
            overflow-y: auto;
            border-radius: var(--radius-sm);
            top: calc(100% + 4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.1);
        }

        .results-box::-webkit-scrollbar { width: 4px; }
        .results-box::-webkit-scrollbar-track { background: transparent; }
        .results-box::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }

        .result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            text-align: right;
            transition: all 0.15s;
            font-size: 14px;
        }

        .result-item:last-child { border-bottom: none; }
        .result-item:hover {
            background: var(--gold-glow);
            color: var(--gold-light);
            padding-right: 20px;
        }

        /* ─── History Items ─── */
        .history-item {
            background: var(--card2);
            padding: 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            border: 1px solid var(--border);
            border-right: 3px solid var(--gold-dim);
            transition: all 0.2s ease;
        }

        .history-item:hover {
            border-right-color: var(--gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transform: translateX(-2px);
        }

        .history-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .history-name {
            font-weight: 700;
            font-size: 17px;
            color: var(--gold-light);
            margin: 4px 0 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-name:hover { color: var(--gold); }

        .history-actions {
            display: flex;
            gap: 8px;
            margin-top: 2px;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        .history-btn {
            flex: 1;
            padding: 7px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Tajawal';
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .history-btn:hover { filter: brightness(1.15); }

        /* ─── Items Grid (Browse) ─── */
        .item-row {
            background: var(--card2);
            border: 1px solid var(--border);
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 7px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
            font-size: 14px;
        }

        .item-row:hover { border-color: var(--border-gold); }

        .item-actions { display: flex; gap: 6px; }

        .item-btn {
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Tajawal';
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .item-btn:hover { filter: brightness(1.15); transform: scale(1.03); }

        /* ─── Modals ─── */
        #multiShareModal, #detailsModal {
            position: fixed;
            inset: 0;
            background: rgba(4, 8, 16, 0.92);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
            backdrop-filter: blur(8px);
        }

        .modal-card {
            background: var(--card);
            padding: 28px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border-gold);
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(201,168,76,0.1);
        }

        .modal-card::before {
            content: '';
            display: block;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: -28px -28px 24px;
            border-radius: 16px 16px 0 0;
        }

        .modal-title {
            color: var(--gold);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            font-family: 'Aref Ruqaa';
        }

        /* ─── Details Modal ─── */
        .details-modal-inner {
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border-gold);
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .details-modal-inner::-webkit-scrollbar { width: 4px; }
        .details-modal-inner::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }

        .close-btn {
            position: absolute;
            left: 15px; top: 15px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px; height: 32px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            z-index: 10;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .close-btn:hover { transform: scale(1.1); }

        /* ─── Sync Btn ─── */
        .sync-btn {
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--success), #2a9470);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Tajawal';
            transition: all 0.2s;
            box-shadow: 0 3px 12px rgba(61,186,140,0.3);
        }
        .sync-btn:hover { filter: brightness(1.1); box-shadow: 0 5px 18px rgba(61,186,140,0.4); }

        /* ─── Back to top ─── */
        #backToTop {
            position: fixed;
            bottom: 28px;
            left: 20px;
            width: 46px; height: 46px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            color: #000;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 4px 18px rgba(201,168,76,0.5);
            z-index: 1500;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #backToTop:hover { transform: scale(1.12) translateY(-2px); }

        /* ─── Login ─── */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, #0d1626 0%, #05090f 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 320px;
            text-align: center;
            background: var(--card);
            padding: 36px 28px;
            border-radius: 20px;
            border: 1px solid var(--border-gold);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 60px rgba(201,168,76,0.05);
            animation: loginFade 0.6s ease;
        }

        @keyframes loginFade {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold-dim);
            box-shadow: 0 0 30px rgba(201,168,76,0.3);
            margin-bottom: 16px;
        }

        .login-brand { font-size: 44px; display: block; margin-bottom: 4px; }

        .login-version {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .login-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
            margin: 16px 0;
        }

        /* ─── Decorative lines ─── */
        .section-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-label::before, .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ─── Hidden ─── */
        .hidden { display: none !important; }

        /* ─── Export (off-screen) ─── */
        #exportContainer {
            position: fixed;
            left: -9999px; top: 0;
            width: 750px;
            background: white;
        }

        .export-page { background: white !important; padding: 30px; color: black !important; }
        .invoice-table { width: 100%; border-collapse: collapse; margin-top: 10px; border: 2px solid #000; }
        .invoice-table th, .invoice-table td {
            padding: 5px 8px; font-size: 16px; font-weight: bold; text-align: center;
            border: 1px solid #000; background: #fff !important; color: #000 !important;
        }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

        /* ─── Empty state ─── */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 10px; opacity: 0.4; }
        .empty-state p { font-size: 14px; }

        /* ─── Toast notification ─── */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background: var(--card);
            border: 1px solid var(--border-gold);
            color: var(--gold-light);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            z-index: 3000;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #toast.show { transform: translateY(0); opacity: 1; }

        /* ─── Header info row ─── */
        .header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- Login -->
<div id="loginOverlay">
    <div class="login-card">
        <img src="https://i.ibb.co/4R44srhj/image.jpg" class="login-avatar" alt="logo">
        <span class="brand-name login-brand">المحلاوي</span>
        <div class="login-version">Version 3.0</div>
        <div class="login-divider"></div>
        <input type="password" id="passInput" placeholder="أدخل الرمز السري" style="text-align:center; margin-bottom:10px;" onkeydown="if(event.key==='Enter') checkPassword()">
        <button class="btn btn-main" onclick="checkPassword()">دخول ← </button>
    </div>
</div>

<!-- Back to Top -->
<button id="backToTop" onclick="scrollToTop()">↑</button>

<!-- Share Modal -->
<div id="multiShareModal" class="hidden">
    <div class="modal-card">
        <div class="modal-title" id="shareTitle">إرسال الفاتورة</div>
        <div id="shareStatus" style="color:var(--text); font-size:16px; margin-bottom:20px; line-height:1.6;"></div>
        <button id="nextShareBtn" class="btn btn-main" style="height:56px; font-size:18px; margin-bottom:12px;">بدء الإرسال</button>
        <button onclick="document.getElementById('multiShareModal').classList.add('hidden')" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:13px; font-family:'Tajawal';">إلغاء</button>
    </div>
</div>

<!-- Details Modal -->
<div id="detailsModal" class="hidden">
    <div class="details-modal-inner">
        <button class="close-btn" onclick="document.getElementById('detailsModal').classList.add('hidden')">✕</button>
        <h3 id="modalClientName" style="color:var(--gold); font-family:'Aref Ruqaa'; font-size:26px; margin-bottom:4px; padding-left:40px;"></h3>
        <p id="modalDate" style="font-size:12px; color:var(--text-muted); margin-bottom:10px;"></p>
        <div id="modalNotes" style="font-size:13px; color:var(--text-muted); background:rgba(0,0,0,0.2); padding:10px 14px; border-radius:8px; border-right:2px solid var(--gold-dim); margin-bottom:15px;"></div>
        <div id="modalItemsList"></div>
    </div>
</div>

<!-- App -->
<div id="appContent" class="hidden">
    <header>
        <div class="header-info">
            <img src="https://i.ibb.co/4R44srhj/image.jpg" class="header-logo" alt="logo">
            <span class="brand-name" style="font-size:26px;">المحلاوي</span>
        </div>
        <span class="version-badge">V 3.0</span>
    </header>

    <div class="nav-tabs">
        <button id="tab1" class="active" onclick="switchPage('order')">📋 الطلبية</button>
        <button id="tab2" onclick="switchPage('browse')">📦 الأصناف</button>
        <button id="tab3" onclick="switchPage('history')">🕒 السجل</button>
    </div>

    <div class="container">

        <!-- Order Page -->
        <div id="orderPage">
            <div class="card">
                <div class="section-label">بيانات الطلبية</div>
                <div class="input-wrapper">
                    <input type="text" id="clientName" placeholder="👤  اسم العميل...">
                </div>
                <div class="input-wrapper">
                    <input type="text" id="clientNotes" placeholder="📝  ملاحظات للعميل...">
                </div>

                <div class="section-label" style="margin-top:6px;">إضافة صنف</div>
                <div class="input-wrapper" style="position:relative;">
                    <input type="text" id="itemSearch" placeholder="🔍  ابحث عن مادة..." autocomplete="off">
                    <button class="voice-btn" onclick="startVoice('itemSearch')">🎤</button>
                    <div id="results" class="results-box hidden"></div>
                </div>
                <div class="input-wrapper">
                    <input type="number" id="qty" placeholder="الكمية" inputmode="numeric" min="1" onkeydown="if(event.key==='Enter') addItem()">
                </div>

                <button class="btn btn-main" onclick="addItem()">➕  إضافة للجدول</button>

                <div class="table-wrapper">
                    <table id="resultTable">
                        <thead>
                            <tr>
                                <th style="width:40px">م</th>
                                <th>المادة</th>
                                <th style="width:80px">الكمية</th>
                                <th style="width:70px">إجراء</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div class="grid-buttons">
                    <button class="btn btn-action full-width" style="background:linear-gradient(135deg,var(--share),#5a3d9e); color:white;" onclick="prepareAndShowShare()">🔗  مشاركة وحفظ (صور)</button>
                    <button class="btn btn-action" style="background:linear-gradient(135deg,var(--pdf),#b03020); color:white;" onclick="exportToPDF()">📑  تصدير PDF</button>
                    <button class="btn btn-action" style="background:linear-gradient(135deg,#25D366,#1a9e4a); color:white;" onclick="shareToWhatsApp()">💬  واتساب</button>
                    <button class="btn btn-action" style="background:linear-gradient(135deg,#1d9ce0,#0f6fa8); color:white;" onclick="processExport()">📸  حفظ كصور</button>
                    <button id="adminTestBtn" class="btn btn-action full-width hidden" style="background:#2a3040; color:var(--gold-dim); border:1px dashed var(--border-gold);" onclick="addRandomItems()">🧪  أصناف تجريبية</button>
                    <button class="btn btn-action full-width" style="background:#1a2235; color:var(--danger); border:1px solid rgba(224,82,82,0.3);" onclick="clearTable()">🗑️  مسح الجدول</button>
                </div>
            </div>
        </div>

        <!-- Browse Page -->
        <div id="browsePage" class="hidden">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <span class="card-title" style="margin-bottom:0;">📦 إدارة الأصناف</span>
                    <button class="sync-btn" id="syncBtn" onclick="syncFromCloud()">🔄 مزامنة</button>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="newItemName" placeholder="🔍  بحث أو إضافة صنف..." oninput="renderCloudItems(this.value)">
                </div>
                <button class="btn btn-main" onclick="addCloudItemManual()">💾  حفظ صنف جديد</button>
                <div id="itemsGrid" style="margin-top:16px;"></div>
            </div>
        </div>

        <!-- History Page -->
        <div id="historyPage" class="hidden">
            <div class="card">
                <span class="card-title">🕒 الفواتير المحفوظة</span>
                <div class="input-wrapper">
                    <input type="text" id="historySearch" placeholder="🔍  ابحث باسم العميل..." oninput="renderHistory(this.value)">
                </div>
                <div id="historyList" style="margin-top:14px;"></div>
                <button class="btn btn-action full-width" style="background:#1a0d0d; color:var(--danger); border:1px solid rgba(224,82,82,0.3); margin-top:16px;" onclick="clearHistory()">🗑️  مسح السجل بالكامل</button>
            </div>
        </div>

    </div>
</div>

<div id="exportContainer"></div>

<script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycby94J0O_uH3WIFzLoelLDAVMagTZEGbo0LAfbVaVR_52wgSoCtbqJ-6ZHjbnUBujlfc/exec';
    const LOGO_URL = 'https://i.ibb.co/4R44srhj/image.jpg';
    let localItems = JSON.parse(localStorage.getItem("items")) || [];
    let invoiceHistory = JSON.parse(localStorage.getItem("invoiceHistory")) || [];
    let shareQueue = [];

    // Toast
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    // Back to top
    window.onscroll = function() {
        const btn = document.getElementById("backToTop");
        btn.style.display = (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) ? "flex" : "none";
    };
    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    // Login
    function checkPassword() {
        const pass = document.getElementById("passInput").value;
        if (pass === "123" || pass === "4040") {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("appContent").classList.remove("hidden");
            if (pass === "4040") document.getElementById("adminTestBtn").classList.remove("hidden");
            renderCloudItems();
            renderHistory();
        } else {
            showToast("❌ الرمز خطأ، حاول مجدداً");
        }
    }

    // Add item
    function addItem() {
        const itemInput = document.getElementById("itemSearch");
        const item = itemInput.value.trim();
        const qty = parseInt(document.getElementById("qty").value);
        if (!item) { showToast("⚠️ يرجى إدخال اسم الصنف"); return; }
        if (!qty || qty < 1) { showToast("⚠️ يرجى إدخال كمية صحيحة"); return; }
        saveItemToCloud(item);
        const tbody = document.querySelector("#resultTable tbody");
        const row = tbody.insertRow(-1);
        row.innerHTML = `
            <td><span class="row-num">${tbody.rows.length}</span></td>
            <td style="text-align:right">${item}</td>
            <td>${qty}</td>
            <td>
                <button class="action-btn edit" onclick="editRow(this)" title="تعديل">📝</button>
                <button class="action-btn del" onclick="removeRow(this)" title="حذف">✖</button>
            </td>`;
        itemInput.value = ""; document.getElementById("qty").value = "";
        document.getElementById("results").classList.add("hidden");
        itemInput.focus();
    }

    function editRow(btn) {
        const row = btn.parentElement.parentElement;
        document.getElementById("itemSearch").value = row.cells[1].innerText;
        document.getElementById("qty").value = row.cells[2].innerText;
        row.remove(); updateTableNumbers();
        document.getElementById("qty").focus();
    }

    function removeRow(btn) { btn.parentElement.parentElement.remove(); updateTableNumbers(); }

    function updateTableNumbers() {
        document.querySelectorAll("#resultTable tbody tr").forEach((row, i) => {
            row.cells[0].innerHTML = `<span class="row-num">${i+1}</span>`;
        });
    }

    // Save history
    function saveInvoiceToHistory() {
        const client = document.getElementById("clientName").value || "عميل غير مسمى";
        const notes = document.getElementById("clientNotes").value || "";
        const rows = Array.from(document.querySelectorAll("#resultTable tbody tr"));
        if (rows.length === 0) return;
        const items = rows.map(r => ({ name: r.cells[1].innerText, qty: r.cells[2].innerText }));
        const invoice = { id: Date.now(), client, notes, date: new Date().toLocaleString('ar-EG'), items, totalItems: items.length };
        invoiceHistory.unshift(invoice);
        localStorage.setItem("invoiceHistory", JSON.stringify(invoiceHistory));
        renderHistory();
    }

    // Render history
    function renderHistory(filter = "") {
        const list = document.getElementById("historyList"); list.innerHTML = "";
        const filtered = invoiceHistory.filter(h => h.client.toLowerCase().includes(filter.toLowerCase()));
        if (filtered.length === 0) {
            list.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>لا توجد فواتير محفوظة</p></div>`;
            return;
        }
        filtered.forEach(inv => {
            const div = document.createElement("div");
            div.className = "history-item";

            const meta = document.createElement("div");
            meta.className = "history-meta";
            meta.innerHTML = `<span>📅 ${inv.date}</span><span>📦 ${inv.totalItems} صنف</span>`;

            const name = document.createElement("div");
            name.className = "history-name";
            name.textContent = `👤 ${inv.client}`;
            name.onclick = () => showInvoiceDetails(inv);

            const actions = document.createElement("div");
            actions.className = "history-actions";

            const editBtn = document.createElement("button");
            editBtn.className = "history-btn";
            editBtn.style.cssText = "background:var(--edit);color:white;";
            editBtn.textContent = "📝 تعديل";
            editBtn.onclick = () => editInvoiceFromHistory(inv.id);

            const delBtn = document.createElement("button");
            delBtn.className = "history-btn";
            delBtn.style.cssText = "background:var(--danger);color:white;";
            delBtn.textContent = "🗑️ حذف";
            delBtn.onclick = () => deleteInvoiceFromHistory(inv.id);

            actions.appendChild(editBtn);
            actions.appendChild(delBtn);
            div.appendChild(meta);
            div.appendChild(name);
            div.appendChild(actions);
            list.appendChild(div);
        });
    }

    function deleteInvoiceFromHistory(id) {
        if (confirm("حذف هذه الفاتورة نهائياً؟")) {
            invoiceHistory = invoiceHistory.filter(i => i.id !== id);
            localStorage.setItem("invoiceHistory", JSON.stringify(invoiceHistory));
            renderHistory();
            showToast("🗑️ تم حذف الفاتورة");
        }
    }

    function editInvoiceFromHistory(id) {
        const inv = invoiceHistory.find(i => i.id === id);
        if (!inv) return;
        if (confirm("نقل بيانات الفاتورة للتعديل؟")) {
            document.getElementById("clientName").value = inv.client;
            document.getElementById("clientNotes").value = inv.notes || "";
            const tbody = document.querySelector("#resultTable tbody");
            tbody.innerHTML = "";
            inv.items.forEach((item, idx) => {
                const row = tbody.insertRow(-1);
                row.innerHTML = `
                    <td><span class="row-num">${idx+1}</span></td>
                    <td style="text-align:right">${item.name}</td>
                    <td>${item.qty}</td>
                    <td>
                        <button class="action-btn edit" onclick="editRow(this)">📝</button>
                        <button class="action-btn del" onclick="removeRow(this)">✖</button>
                    </td>`;
            });
            switchPage('order');
        }
    }

    function showInvoiceDetails(inv) {
        document.getElementById("modalClientName").innerText = inv.client;
        document.getElementById("modalDate").innerText = inv.date;
        document.getElementById("modalNotes").innerText = inv.notes ? `ملاحظات: ${inv.notes}` : "لا توجد ملاحظات";
        let html = `<div class="table-wrapper"><table><thead><tr><th>م</th><th>الصنف</th><th>الكمية</th></tr></thead><tbody>`;
        inv.items.forEach((item, idx) => {
            html += `<tr><td><span class="row-num">${idx+1}</span></td><td style="text-align:right;padding-right:14px">${item.name}</td><td style="font-weight:700;color:var(--gold-light)">${item.qty}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        document.getElementById("modalItemsList").innerHTML = html;
        document.getElementById("detailsModal").classList.remove("hidden");
    }

    // ─── PDF Export (real PDF via jsPDF + html2canvas) ───
    async function exportToPDF() {
        const rows = Array.from(document.querySelectorAll("#resultTable tbody tr"));
        if (rows.length === 0) return showToast("⚠️ الجدول فارغ!");
        saveInvoiceToHistory();

        const clientName  = document.getElementById("clientName").value  || "عميل";
        const clientNotes = document.getElementById("clientNotes").value || "لا يوجد ملاحظات";
        const dateStr     = new Date().toLocaleString('ar-EG', { hour12: true });

        showToast("⏳ جاري إنشاء PDF...");

        // Build off-screen page(s)
        const container   = document.getElementById("exportContainer");
        container.innerHTML = "";
        const itemsPerPage = 30;
        const totalPages   = Math.ceil(rows.length / itemsPerPage);

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();

        for (let i = 0; i < totalPages; i++) {
            const pageItems = rows.slice(i * itemsPerPage, (i + 1) * itemsPerPage);
            const pageDiv   = document.createElement("div");
            pageDiv.className = "export-page";
            pageDiv.style.width  = "750px";
            pageDiv.style.minHeight = "1060px";
            pageDiv.style.padding   = "30px";
            pageDiv.style.background = "#fff";
            pageDiv.style.fontFamily = "'Cairo', sans-serif";
            pageDiv.style.direction  = "rtl";

            pageDiv.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;
                            border-bottom:4px solid #b08d57;padding-bottom:12px;margin-bottom:16px;">
                    <div>
                        <div style="font-size:28px;font-weight:900;color:#b08d57;font-family:'Aref Ruqaa',serif;">المحلاوي</div>
                        <div style="font-size:11px;color:#888;margin-top:3px;">نظام إدارة الطلبيات السحابي</div>
                    </div>
                    <div style="text-align:left;font-size:11px;color:#555;line-height:1.7;">
                        <div>${dateStr}</div>
                        <div>صفحة ${i+1} / ${totalPages}</div>
                    </div>
                </div>

                <div style="background:#fffbf2;border:1px solid #e8d8a0;border-radius:6px;
                            padding:10px 14px;margin-bottom:14px;font-size:14px;line-height:1.8;">
                    <div>السيد / <b>${clientName}</b></div>
                    <div style="color:#666;">ملاحظات: ${clientNotes}</div>
                </div>

                <table style="width:100%;border-collapse:collapse;font-size:13px;">
                    <thead>
                        <tr style="background:#b08d57;">
                            <th style="padding:9px 6px;color:#fff;border:1px solid #8a6830;width:8%;">م</th>
                            <th style="padding:9px 6px;color:#fff;border:1px solid #8a6830;text-align:right;">الصنف</th>
                            <th style="padding:9px 6px;color:#fff;border:1px solid #8a6830;width:18%;">الكمية</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${pageItems.map((r, idx) => {
                            const bg = idx % 2 === 0 ? '#fff' : '#faf8f3';
                            return `<tr style="background:${bg};">
                                <td style="padding:8px 6px;border:1px solid #ddd;text-align:center;">${(i*itemsPerPage)+idx+1}</td>
                                <td style="padding:8px 10px;border:1px solid #ddd;text-align:right;">${r.cells[1].innerText}</td>
                                <td style="padding:8px 6px;border:1px solid #ddd;text-align:center;font-weight:bold;">${r.cells[2].innerText}</td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>

                ${i === totalPages - 1 ? `
                <div style="margin-top:auto;padding-top:20px;border-top:1px dashed #ccc;
                            text-align:center;font-size:11px;color:#999;position:absolute;
                            bottom:30px;left:30px;right:30px;">
                    شكراً لتعاملكم معنا — نظام المحلاوي السحابي
                </div>` : ''}
            `;

            container.appendChild(pageDiv);

            const canvas = await html2canvas(pageDiv, {
                scale: 2, useCORS: true,
                backgroundColor: '#ffffff',
                width: 750, windowWidth: 750
            });

            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            const imgW    = pageW - 10;
            const imgH    = (canvas.height * imgW) / canvas.width;

            if (i > 0) pdf.addPage();
            pdf.addImage(imgData, 'JPEG', 5, 5, imgW, Math.min(imgH, pageH - 10));
        }

        container.innerHTML = "";
        pdf.save(`فاتورة_${clientName}_${Date.now()}.pdf`);
        showToast("✅ تم تحميل PDF بنجاح!");
    }

    // ─── WhatsApp Share ───
    function shareToWhatsApp() {
        const rows = Array.from(document.querySelectorAll("#resultTable tbody tr"));
        if (rows.length === 0) return showToast("⚠️ الجدول فارغ!");

        const clientName  = document.getElementById("clientName").value  || "عميل";
        const clientNotes = document.getElementById("clientNotes").value || "";
        const dateStr     = new Date().toLocaleString('ar-EG', { hour12: true });

        let msg = `🏪 *نظام المحلاوي*\n`;
        msg    += `━━━━━━━━━━━━━━━\n`;
        msg    += `👤 *العميل:* ${clientName}\n`;
        msg    += `📅 *التاريخ:* ${dateStr}\n`;
        if (clientNotes) msg += `📝 *ملاحظات:* ${clientNotes}\n`;
        msg    += `━━━━━━━━━━━━━━━\n`;
        msg    += `📦 *قائمة الطلبية:*\n\n`;

        rows.forEach((r, idx) => {
            msg += `${idx+1}. ${r.cells[1].innerText}  ──  *${r.cells[2].innerText}*\n`;
        });

        msg += `\n━━━━━━━━━━━━━━━\n`;
        msg += `📊 *إجمالي الأصناف:* ${rows.length} صنف\n`;
        msg += `_شكراً لتعاملكم معنا_ 🌟`;

        const encoded = encodeURIComponent(msg);

        // فتح واتساب مباشرة
        const waUrl = `https://wa.me/?text=${encoded}`;
        window.open(waUrl, '_blank');
    }

    // Share
    async function prepareAndShowShare() {
        const rows = Array.from(document.querySelectorAll("#resultTable tbody tr"));
        if (rows.length === 0) return showToast("⚠️ الجدول فارغ!");
        saveInvoiceToHistory();
        const clientName = document.getElementById("clientName").value || "عميل";
        const clientNotes = document.getElementById("clientNotes").value || "لا يوجد";
        const container = document.getElementById("exportContainer");
        container.innerHTML = ""; shareQueue = [];
        const itemsPerPage = 32;
        const totalPages = Math.ceil(rows.length / itemsPerPage);
        const modal = document.getElementById("multiShareModal");
        const status = document.getElementById("shareStatus");
        const btn = document.getElementById("nextShareBtn");
        modal.classList.remove("hidden"); btn.disabled = true; status.innerText = "⏳ جاري المعالجة...";
        for (let i = 0; i < totalPages; i++) {
            const pageDiv = document.createElement("div"); pageDiv.className = "export-page";
            const pageItems = rows.slice(i * itemsPerPage, (i + 1) * itemsPerPage);
            pageDiv.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:4px solid #b08d57;padding-bottom:10px;margin-bottom:15px;">
                <img src="${LOGO_URL}" crossorigin="anonymous" style="width:80px;height:80px;border-radius:50%;">
                <h1 style="color:#b08d57;font-family:'Aref Ruqaa';">المحلاوي</h1></div>
                <div style="color:black;">السيد: <b>${clientName}</b> | صفحة ${i+1}/${totalPages}</div>
                <table class="invoice-table"><thead><tr><th>م</th><th>الصنف</th><th>الكمية</th></tr></thead>
                <tbody>${pageItems.map((r,idx)=>`<tr><td>${(i*itemsPerPage)+idx+1}</td><td>${r.cells[1].innerText}</td><td>${r.cells[2].innerText}</td></tr>`).join('')}</tbody></table>
                <div style="color:black;margin-top:10px;">ملاحظات: ${clientNotes}</div>`;
            container.appendChild(pageDiv);
            const canvas = await html2canvas(pageDiv, { scale: 2, useCORS: true });
            const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
            shareQueue.push(new File([blob], `فاتورة_${i+1}.png`, { type: 'image/png' }));
        }
        let currentIdx = 0;
        status.innerText = `✅ جاهز لـ ${totalPages} صفحة`; btn.disabled = false; btn.innerText = `📤 إرسال صفحة 1`;
        btn.onclick = async () => {
            try {
                await navigator.share({ files: [shareQueue[currentIdx]], text: currentIdx === 0 ? `طلبية: ${clientName}` : '' });
                currentIdx++;
                if (currentIdx < shareQueue.length) { btn.innerText = `📤 إرسال صفحة ${currentIdx+1}`; status.innerText = `✅ تم إرسال ${currentIdx}/${totalPages}`; }
                else { status.innerText = "🎉 تم الإرسال بنجاح!"; btn.innerText = "إغلاق"; btn.onclick = () => modal.classList.add("hidden"); }
            } catch(e) {}
        };
    }

    // Save as images
    async function processExport() {
        const rows = Array.from(document.querySelectorAll("#resultTable tbody tr"));
        if (rows.length === 0) return showToast("⚠️ الجدول فارغ!");
        const container = document.getElementById("exportContainer"); container.innerHTML = "";
        const totalPages = Math.ceil(rows.length / 32);
        for (let i = 0; i < totalPages; i++) {
            const pageDiv = document.createElement("div"); pageDiv.className = "export-page";
            const pageItems = rows.slice(i * 32, (i + 1) * 32);
            pageDiv.innerHTML = `<div style="padding:15px;background:white;color:black;"><h2>صفحة ${i+1}</h2><table class="invoice-table"><thead><tr><th>م</th><th>الصنف</th><th>الكمية</th></tr></thead><tbody>${pageItems.map((r,idx)=>`<tr><td>${(i*32)+idx+1}</td><td>${r.cells[1].innerText}</td><td>${r.cells[2].innerText}</td></tr>`).join('')}</tbody></table></div>`;
            container.appendChild(pageDiv);
            const canvas = await html2canvas(pageDiv, { scale: 2, useCORS: true });
            const link = document.createElement('a'); link.download = `فاتورة_${i+1}.png`; link.href = canvas.toDataURL(); link.click();
        }
    }

    // Navigation
    function switchPage(p) {
        document.getElementById("orderPage").classList.toggle("hidden", p !== 'order');
        document.getElementById("browsePage").classList.toggle("hidden", p !== 'browse');
        document.getElementById("historyPage").classList.toggle("hidden", p !== 'history');
        document.getElementById("tab1").classList.toggle("active", p === 'order');
        document.getElementById("tab2").classList.toggle("active", p === 'browse');
        document.getElementById("tab3").classList.toggle("active", p === 'history');
    }

    // Cloud sync
    async function syncFromCloud() {
        const btn = document.getElementById("syncBtn"); btn.innerText = "جاري...";
        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            if (Array.isArray(data)) {
                localItems = [...new Set([...localItems, ...data])];
                localStorage.setItem("items", JSON.stringify(localItems));
                renderCloudItems(); showToast("✅ تم التحديث بنجاح");
            }
        } catch(e) { showToast("❌ خطأ في المزامنة"); }
        btn.innerText = "🔄 مزامنة";
    }

    function saveItemToCloud(name) {
        if (name && !localItems.includes(name)) {
            localItems.push(name);
            localStorage.setItem("items", JSON.stringify(localItems));
            renderCloudItems();
            fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'add', item: name }) });
        }
    }

    function renderCloudItems(filter = "") {
        const grid = document.getElementById("itemsGrid"); grid.innerHTML = "";
        const filtered = localItems.filter(i => i.toLowerCase().includes(filter.toLowerCase()));
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="empty-state"><div class="icon">📦</div><p>لا توجد أصناف محفوظة</p></div>`;
            return;
        }
        filtered.forEach(item => {
            const div = document.createElement("div");
            div.className = "item-row";
            // Use data attributes to avoid quote-breaking in onclick
            const span = document.createElement("span");
            span.style.fontSize = "14px";
            span.textContent = item;
            const actions = document.createElement("div");
            actions.className = "item-actions";
            const editBtn = document.createElement("button");
            editBtn.className = "item-btn";
            editBtn.style.cssText = "background:var(--edit);color:white;";
            editBtn.textContent = "تعديل";
            editBtn.onclick = () => editItem(item);
            const delBtn = document.createElement("button");
            delBtn.className = "item-btn";
            delBtn.style.cssText = "background:var(--danger);color:white;";
            delBtn.textContent = "حذف";
            delBtn.onclick = () => deleteItem(item);
            actions.appendChild(editBtn);
            actions.appendChild(delBtn);
            div.appendChild(span);
            div.appendChild(actions);
            grid.appendChild(div);
        });
    }

    function addCloudItemManual() {
        const input = document.getElementById("newItemName");
        if (input.value.trim()) { saveItemToCloud(input.value.trim()); input.value = ""; showToast("✅ تم حفظ الصنف"); }
    }

    function deleteItem(n) {
        if (confirm("حذف هذا الصنف؟")) {
            localItems = localItems.filter(i => i !== n);
            localStorage.setItem("items", JSON.stringify(localItems));
            renderCloudItems();
            showToast("🗑️ تم حذف الصنف");
        }
    }

    function editItem(o) {
        const n = prompt("تعديل الصنف:", o);
        if (n) {
            localItems[localItems.indexOf(o)] = n;
            localStorage.setItem("items", JSON.stringify(localItems));
            renderCloudItems();
            showToast("✅ تم تعديل الصنف");
        }
    }

    function clearTable() { if (confirm("مسح الجدول بالكامل؟")) { document.querySelector("#resultTable tbody").innerHTML = ""; showToast("🗑️ تم مسح الجدول"); } }
    function clearHistory() { if (confirm("حذف السجل بالكامل؟")) { invoiceHistory = []; localStorage.setItem("invoiceHistory", "[]"); renderHistory(); showToast("🗑️ تم مسح السجل"); } }

    function startVoice(id) {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRec) { showToast("❌ المتصفح لا يدعم التعرف على الصوت"); return; }
        const rec = new SpeechRec();
        rec.lang = 'ar-SA'; rec.start();
        rec.onresult = (e) => {
            document.getElementById(id).value = e.results[0][0].transcript;
            document.getElementById(id).dispatchEvent(new Event('input'));
        };
        rec.onerror = () => showToast("❌ تعذّر التقاط الصوت، حاول مجدداً");
    }

    function addRandomItems() {
        const tbody = document.querySelector("#resultTable tbody");
        for (let i = 1; i <= 35; i++) {
            const row = tbody.insertRow(-1);
            row.innerHTML = `
                <td><span class="row-num">${tbody.rows.length}</span></td>
                <td style="text-align:right">صنف تجريبي ${i}</td>
                <td>${Math.floor(Math.random()*10)+1}</td>
                <td>
                    <button class="action-btn edit" onclick="editRow(this)">📝</button>
                    <button class="action-btn del" onclick="removeRow(this)">✖</button>
                </td>`;
        }
    }

    // Search autocomplete
    document.getElementById("itemSearch").oninput = function() {
        const val = this.value.toLowerCase();
        const resDiv = document.getElementById("results"); resDiv.innerHTML = "";
        if (!val) return resDiv.classList.add('hidden');
        const matches = localItems.filter(i => i.toLowerCase().includes(val));
        if (matches.length === 0) return resDiv.classList.add('hidden');
        matches.forEach(item => {
            const d = document.createElement("div"); d.className = "result-item"; d.textContent = item;
            d.onclick = () => { document.getElementById("itemSearch").value = item; resDiv.classList.add('hidden'); document.getElementById("qty").focus(); };
            resDiv.appendChild(d);
        });
        resDiv.classList.remove('hidden');
    };

    // Close dropdown on outside click
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#itemSearch') && !e.target.closest('#results')) {
            document.getElementById('results').classList.add('hidden');
        }
    });
</script>
</body>
</html>
