<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام المحلاوي</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #b08d57; --bg: #0f172a; --text: #f1f5f9; --card: #1e293b; --border: #334155; --dark: #000000;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --text: #1e293b; --card: #ffffff; --border: #e2e8f0;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); z-index: 9999; display: flex;
            align-items: center; justify-content: center; flex-direction: column;
        }
        .login-card { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 350px; border: 2px solid var(--primary); }

        header { background: var(--dark); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 65px; z-index: 999; }
        .nav-tabs button { flex: 1; padding: 15px; border: none; background: none; color: #94a3b8; font-weight: bold; cursor: pointer; }
        .nav-tabs button.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: rgba(176, 141, 87, 0.1); }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text); box-sizing: border-box; font-size: 16px; outline: none; }
        [data-theme="light"] input { background: #fff; color: #000; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin: 10px 0; font-size: 18px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: var(--card); }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: center; }

        .results-box { position: absolute; background: var(--card); border: 1px solid var(--primary); width: 100%; z-index: 1100; max-height: 250px; overflow-y: auto; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .result-item { padding: 15px; cursor: pointer; border-bottom: 1px solid var(--border); text-align: right; color: var(--text); }

        .hidden { display: none !important; }
        #finalExportContainer { display: block; direction: rtl; padding: 40px; background: #ffffff; width: 800px; color: #000; position: fixed; left: -5000px; top: 0; }
    </style>
</head>
<body data-theme="dark">

<div id="loginOverlay">
    <div class="login-card">
        <img src="https://i.ibb.co/4R44srhj/image.jpg" alt="المحلاوي" style="width: 140px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 15px;">
        <h1 style="color:var(--primary); margin: 0; font-size: 2.5em;">المحلاوي</h1>
        <input type="password" id="passInput" placeholder="أدخل الرمز (123)" style="text-align: center; margin-top: 20px;" onkeydown="if(event.key==='Enter') checkPassword()">
        <button class="btn btn-main" onclick="checkPassword()">دخول</button>
        <p id="loginError" style="color:#ef4444; font-size: 0.9em; margin-top: 10px; display: none;">الرقم السري خطأ!</p>
    </div>
</div>

<div id="appContent" class="hidden">
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="https://i.ibb.co/4R44srhj/image.jpg" style="width: 40px; border-radius: 50%;">
            <div style="color: white; font-weight: bold; font-size: 1.3em;">المحلاوي</div>
        </div>
        <div style="display: flex; gap: 15px;">
            <button onclick="logout()" style="background:none; border:none; color:#ff4444; cursor:pointer;">خروج</button>
            <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:1.2em;">🌓</button>
        </div>
    </header>

    <div class="nav-tabs">
        <button id="tab1" class="active" onclick="switchPage('order')">تسجيل طلب</button>
        <button id="tab2" onclick="switchPage('browse')">الأصناف</button>
    </div>

    <div class="container">
        <div id="orderPage">
            <div class="card">
                <input type="text" id="clientName" placeholder="اسم العميل..." oninput="saveCurrentTable()">
                <div style="position: relative;">
                    <input type="text" id="itemSearch" placeholder="ابحث عن مادة..." autocomplete="off">
                    <div id="results" class="results-box hidden"></div>
                </div>
                <input type="number" id="qty" placeholder="الكمية" inputmode="numeric" onkeydown="if(event.key==='Enter') addItem()">
                <button class="btn btn-main" onclick="addItem()">إضافة للجدول (Enter)</button>

                <table id="resultTable">
                    <thead><tr><th>المادة</th><th>الكمية</th><th>حذف</th></tr></thead>
                    <tbody></tbody>
                </table>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                    <button class="btn" style="background:#25D366; color:white; grid-column: span 2;" onclick="exportAsImage()">📸 واتساب</button>
                    <button class="btn" style="background:var(--primary); color:white;" onclick="exportPDF()">📄 PDF</button>
                    <button class="btn" style="background:#444; color:white;" onclick="clearTable()">🗑️ مسح الكل</button>
                </div>
            </div>
        </div>

        <div id="browsePage" class="hidden">
            <div id="itemsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;"></div>
        </div>
    </div>
</div>

<div id="finalExportContainer">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #b08d57; padding-bottom: 15px; margin-bottom: 20px;">
        <div style="text-align: right;">
            <h1 style="margin: 0; color: #b08d57; font-size: 40px;">المحلاوي</h1>
            <p style="margin: 5px 0; color: #333; font-size: 16px;">كشف طلب بضاعة</p>
        </div>
        <img src="https://i.ibb.co/4R44srhj/image.jpg" style="width: 100px; border-radius: 50%;">
    </div>
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <div style="font-size: 18px;">العميل: <strong id="expClient"></strong></div>
        <div style="font-size: 18px;">التاريخ: <span id="expDate"></span></div>
    </div>
    <table style="width: 100%; border-collapse: collapse; border: 1px solid #000;">
        <thead><tr style="background:#eee;"><th>م</th><th>الصنف</th><th>الكمية</th></tr></thead>
        <tbody id="expBody"></tbody>
    </table>
</div>

<script>
    const APP_PASSWORD = "123";
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbwmEGycYRiyf1HWWuD0_idZcRdqgaHP_n3DeVlmmnzkwaPYTKTwLPEK6wUfxsJCjoE/exec";
    let items = JSON.parse(localStorage.getItem("items")) || [];

    // --- نظام الرقم السري المطور ---
    function checkPassword() {
        const input = document.getElementById("passInput").value;
        if(input === APP_PASSWORD) {
            localStorage.setItem("appAuth", "true"); // حفظ الجلسة في المتصفح
            document.getElementById("loginOverlay").classList.add("hidden");
            document.getElementById("appContent").classList.remove("hidden");
            syncData(); 
            loadSavedTable();
        } else {
            document.getElementById("loginError").style.display = "block";
        }
    }

    function logout() {
        localStorage.removeItem("appAuth");
        location.reload();
    }

    // --- محرك البحث والترحيل ---
    async function syncData() {
        try {
            const res = await fetch(SHEET_URL);
            const data = await res.json();
            if(data) { items = data; localStorage.setItem("items", JSON.stringify(items)); }
        } catch (e) {}
    }

    document.getElementById("itemSearch").oninput = function() {
        const val = this.value.toLowerCase();
        const resDiv = document.getElementById("results");
        resDiv.innerHTML = "";
        if(!val) return resDiv.classList.add('hidden');
        const filtered = items.filter(i => i.toLowerCase().includes(val)).slice(0, 10);
        filtered.forEach(item => {
            const d = document.createElement("div");
            d.className = "result-item"; d.textContent = item;
            d.onclick = () => {
                document.getElementById("itemSearch").value = item;
                resDiv.classList.add('hidden');
                document.getElementById("qty").focus();
            };
            resDiv.appendChild(d);
        });
        resDiv.classList.remove('hidden');
    };

    function addItem() {
        const name = document.getElementById("itemSearch").value;
        const qty = document.getElementById("qty").value;
        if(!name || !qty) return;
        const tbody = document.querySelector("#resultTable tbody");
        const row = tbody.insertRow(0);
        row.innerHTML = `<td style="text-align:right">${name}</td><td style="font-weight:bold">${qty}</td><td><button onclick="this.parentElement.parentElement.remove();saveCurrentTable();" style="background:#ef4444;color:white;border:none;padding:5px 8px;border-radius:4px;">X</button></td>`;
        saveCurrentTable();
        document.getElementById("itemSearch").value = "";
        document.getElementById("qty").value = "";
        document.getElementById("itemSearch").focus();
    }

    // --- التصدير والحفظ ---
    function saveCurrentTable() {
        const rows = [];
        document.querySelectorAll("#resultTable tbody tr").forEach(tr => rows.push({ n: tr.cells[0].innerText, q: tr.cells[1].innerText }));
        localStorage.setItem("draftOrder", JSON.stringify(rows));
        localStorage.setItem("draftClient", document.getElementById("clientName").value);
    }

    function loadSavedTable() {
        document.getElementById("clientName").value = localStorage.getItem("draftClient") || "";
        const saved = JSON.parse(localStorage.getItem("draftOrder") || "[]");
        const tbody = document.querySelector("#resultTable tbody");
        saved.forEach(item => {
            const row = tbody.insertRow();
            row.innerHTML = `<td style="text-align:right">${item.n}</td><td style="font-weight:bold">${item.q}</td><td><button onclick="this.parentElement.parentElement.remove();saveCurrentTable();" style="background:#ef4444;color:white;border:none;padding:5px 8px;border-radius:4px;">X</button></td>`;
        });
    }

    function exportAsImage() {
        document.getElementById("expClient").innerText = document.getElementById("clientName").value || "بدون اسم";
        document.getElementById("expDate").innerText = new Date().toLocaleDateString('ar-EG');
        const b = document.getElementById("expBody"); b.innerHTML = "";
        document.querySelectorAll("#resultTable tbody tr").forEach((r, i) => {
            b.innerHTML += `<tr><td style="border:1px solid #000;padding:8px;">${i+1}</td><td style="border:1px solid #000;padding:8px;text-align:right;">${r.cells[0].innerText}</td><td style="border:1px solid #000;padding:8px;font-weight:bold;">${r.cells[1].innerText}</td></tr>`;
        });
        const target = document.getElementById("finalExportContainer");
        html2canvas(target, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `المحلاوي_${document.getElementById("clientName").value}.png`;
            link.href = canvas.toDataURL(); link.click();
        });
    }

    function clearTable() { if(confirm("مسح الكل؟")) { document.querySelector("#resultTable tbody").innerHTML = ""; localStorage.removeItem("draftOrder"); } }
    function switchPage(p) {
        document.getElementById("orderPage").classList.toggle("hidden", p !== 'order');
        document.getElementById("browsePage").classList.toggle("hidden", p !== 'browse');
        document.getElementById("tab1").classList.toggle("active", p === 'order');
        document.getElementById("tab2").classList.toggle("active", p === 'browse');
    }
    function toggleTheme() {
        const b = document.body;
        b.setAttribute("data-theme", b.getAttribute("data-theme") === "dark" ? "light" : "dark");
    }

    // التشغيل عند فتح الصفحة
    window.onload = () => {
        if (localStorage.getItem("appAuth") === "true") {
            document.getElementById("loginOverlay").classList.add("hidden");
            document.getElementById("appContent").classList.remove("hidden");
            syncData(); 
            loadSavedTable();
        }
    };
</script>

</body>
</html>
