<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام ال وحيد - النسخة V2.0</title>

    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { 
            --primary: #b08d57; 
            --gold-gradient: linear-gradient(to bottom, #f1c40f, #b08d57);
            --bg: #0f172a; --text: #f1f5f9; --card: #1e293b; --border: #334155; 
            --dark: #000000; --danger: #ef4444; --edit: #3b82f6; --share: #8b5cf6;
            --success: #10b981;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        
        .brand-name {
            font-family: 'Aref Ruqaa', serif; font-size: 32px; font-weight: bold;
            background: var(--gold-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5));
            display: inline-block;
        }

        header { 
            background: linear-gradient(145deg, #000, #1a1a1a); padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000;
        }

        .nav-tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
        .nav-tabs button { flex: 1; padding: 15px; border: none; background: none; color: #94a3b8; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
        .nav-tabs button.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: rgba(176, 141, 87, 0.1); }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        .search-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
        
        input { 
            width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); 
            border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text); 
            box-sizing: border-box; font-size: 16px; outline: none; font-family: 'Cairo'; 
        }
        
        .voice-btn { position: absolute; left: 10px; background: none; border: none; color: var(--primary); font-size: 20px; cursor: pointer; padding: 5px; z-index: 5; }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; font-family: 'Cairo'; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin: 10px 0; font-size: 18px; }
        
        .grid-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .full-width { grid-column: span 2; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: center; }

        .results-box { position: absolute; background: var(--card); border: 1px solid var(--primary); width: 100%; z-index: 1100; max-height: 250px; overflow-y: auto; border-radius: 8px; top: 55px; }
        .result-item { padding: 15px; cursor: pointer; border-bottom: 1px solid var(--border); text-align: right; }

        .hidden { display: none !important; }
        .item-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; text-align: right; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* ستايلات التصدير الورقية */
        .export-page { 
            background: white; color: black; padding: 40px; width: 794px; 
            direction: rtl; position: fixed; left: -9999px; top: 0;
        }
        .export-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 2px solid #000; }
        .export-table th, .export-table td { 
            border: 1px solid #000; padding: 10px; font-size: 18px; font-weight: bold; text-align: center; 
        }
    </style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <div class="card" style="width:320px; text-align:center; border: 2px solid var(--primary); background: #111; position: relative;">
        <span style="position: absolute; top: 10px; left: 10px; font-size: 11px; color: var(--primary); font-weight: bold; opacity: 0.8;">V 2.0.1</span>
        <img src="https://i.ibb.co/4R44srhj/image.jpg" style="width: 110px; height:110px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 15px; object-fit: cover;">
        <div class="brand-name" style="font-size: 40px; margin-bottom: 10px;">ال وحيد</div>
        <input type="password" id="passInput" placeholder="الرمز (123)" style="text-align:center;" onkeydown="if(event.key==='Enter') checkPassword()">
        <button class="btn btn-main" onclick="checkPassword()">دخول للنظام</button>
    </div>
</div>

<div id="appContent" class="hidden">
    <header>
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="https://i.ibb.co/4R44srhj/image.jpg" style="width: 45px; height:45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary);">
            <div class="brand-name">ال وحيد</div>
        </div>
    </header>

    <div class="nav-tabs">
        <button id="tab1" class="active" onclick="switchPage('order')">تسجيل طلبية</button>
        <button id="tab2" onclick="switchPage('browse')">مخزن الأصناف</button>
    </div>

    <div class="container">
        <div id="orderPage">
            <div class="card">
                <input type="text" id="clientName" placeholder="اسم العميل...">
                <div class="search-wrapper">
                    <input type="text" id="itemSearch" placeholder="ابحث عن مادة..." autocomplete="off">
                    <button class="voice-btn" onclick="startVoice('itemSearch')">🎤</button>
                    <div id="results" class="results-box hidden"></div>
                </div>
                <input type="number" id="qty" placeholder="الكمية المطلوبة" inputmode="numeric" onkeydown="if(event.key==='Enter') addItem()">
                <button class="btn btn-main" onclick="addItem()">➕ إضافة للجدول</button>

                <table id="resultTable">
                    <thead><tr><th>المادة</th><th>الكمية</th><th>حذف</th></tr></thead>
                    <tbody></tbody>
                </table>

                <div class="grid-buttons">
                    <button class="btn full-width" style="background:var(--share); color:white;" onclick="shareAsImage()">🔗 مشاركة (واتساب)</button>
                    <button class="btn" style="background:#25D366; color:white;" onclick="exportAsImage()">📸 حفظ صورة</button>
                    <button id="pdfBtn" class="btn" style="background:var(--primary); color:white;" onclick="exportPDF()">📄 تصدير PDF منظم</button>
                    <button class="btn full-width" style="background:#444; color:white;" onclick="clearTable()">🗑️ مسح الجدول</button>
                </div>
            </div>
        </div>

        <div id="browsePage" class="hidden">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="color:var(--primary); margin:0;">إدارة الأصناف</h3>
                    <button id="syncBtn" class="btn" style="background:var(--success); color:white; padding: 6px 12px; font-size: 13px;" onclick="syncFromCloud()">
                        🔄 مزامنة السحاب
                    </button>
                </div>
                <div class="search-wrapper">
                    <input type="text" id="newItemName" placeholder="اكتب للبحث أو إضافة صنف جديد..." oninput="renderCloudItems(this.value)">
                    <button class="voice-btn" onclick="startVoice('newItemName', () => renderCloudItems(document.getElementById('newItemName').value))">🎤</button>
                </div>
                <button class="btn btn-main" onclick="addCloudItemManual()">حفظ كصنف جديد ✅</button>
                <div id="itemsGrid" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>
</div>

<div id="pdfWorkingArea"></div>

<script>
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycby94J0O_uH3WIFzLoelLDAVMagTZEGbo0LAfbVaVR_52wgSoCtbqJ-6ZHjbnUBujlfc/exec';
    let localItems = JSON.parse(localStorage.getItem("items")) || ["إسمنت", "حديد", "رمل"];

    function checkPassword() {
        if(document.getElementById("passInput").value === "123") {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("appContent").classList.remove("hidden");
            renderCloudItems();
        } else { alert("الرمز خطأ"); }
    }

    // --- الحل النهائي والمنظم لمشكلة الـ PDF ---
    async function exportPDF() {
        const rows = document.querySelectorAll("#resultTable tbody tr");
        if (rows.length === 0) return alert("الجدول فارغ!");

        const btn = document.getElementById("pdfBtn");
        btn.innerText = "جاري البناء...";
        btn.disabled = true;

        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const itemsPerPage = 25;
            const totalPages = Math.ceil(rows.length / itemsPerPage);
            const client = document.getElementById("clientName").value || "بدون اسم";
            const date = new Date().toLocaleDateString('ar-EG');

            for (let i = 0; i < totalPages; i++) {
                const start = i * itemsPerPage;
                const end = start + itemsPerPage;
                const pageItems = Array.from(rows).slice(start, end);

                // إنشاء عنصر صفحة جديد تماماً لكل مرة
                const pageDiv = document.createElement("div");
                pageDiv.className = "export-page";
                pageDiv.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:5px solid #b08d57; padding-bottom:15px; margin-bottom:20px;">
                        <img src="https://i.ibb.co/4R44srhj/image.jpg" style="width:100px; height:100px; border-radius:50%;">
                        <div style="text-align:left;">
                            <h1 style="margin:0; color:#b08d57; font-size:45px; font-family:'Aref Ruqaa';">ال وحيد</h1>
                            <p style="margin:5px 0; font-size:20px; font-weight:bold;">كشف طلب مواد</p>
                        </div>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <div style="font-size:22px;">السيد: <strong>${client}</strong></div>
                        <div style="font-size:20px;">التاريخ: ${date}</div>
                    </div>
                    <table class="export-table">
                        <thead><tr><th>م</th><th style="text-align:right;">الصنف</th><th>الكمية</th></tr></thead>
                        <tbody>
                            ${pageItems.map((r, idx) => `
                                <tr>
                                    <td>${start + idx + 1}</td>
                                    <td style="text-align:right;">${r.cells[0].innerText}</td>
                                    <td>${r.cells[1].innerText}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div style="margin-top:50px; text-align:right;">
                        <p style="font-weight:bold; font-size:20px; border-bottom:2px solid black; display:inline-block; padding-left:50px;">أ.احمد وحيد / ت.01007519016</p>
                    </div>
                    <div style="text-align:center; margin-top:30px; font-size:14px; color:#888;">صفحة ${i+1} من ${totalPages}</div>
                `;

                document.body.appendChild(pageDiv);

                // التقاط الصفحة الحالية كصورة
                const canvas = await html2canvas(pageDiv, { scale: 2, useCORS: true });
                const imgData = canvas.toDataURL('image/png');

                if (i > 0) pdf.addPage();
                pdf.addImage(imgData, 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);

                // حذف الصفحة المؤقتة من المتصفح فوراً لضمان عدم تداخلها مع التالية
                document.body.removeChild(pageDiv);
            }

            pdf.save(`طلب_${client}.pdf`);
        } catch (e) {
            console.error(e);
            alert("حدث خطأ");
        } finally {
            btn.innerText = "📄 تصدير PDF منظم";
            btn.disabled = false;
        }
    }

    // --- بقية الوظائف ---
    function addItem() {
        const itemInput = document.getElementById("itemSearch");
        const item = itemInput.value.trim();
        const qty = document.getElementById("qty").value;
        if(!item || !qty) return;
        saveItemToCloud(item);
        const tbody = document.querySelector("#resultTable tbody");
        const row = tbody.insertRow(0);
        row.innerHTML = `<td style="text-align:right">${item}</td><td style="font-weight:bold">${qty}</td><td><button onclick="this.parentElement.parentElement.remove()" style="background:none; border:none; color:red; cursor:pointer; font-size:18px;">✖</button></td>`;
        itemInput.value = ""; document.getElementById("qty").value = ""; itemInput.focus();
    }

    function renderCloudItems(filter = "") {
        const grid = document.getElementById("itemsGrid");
        grid.innerHTML = "";
        const filtered = localItems.filter(i => i.toLowerCase().includes(filter.toLowerCase()));
        filtered.forEach(item => {
            const div = document.createElement("div");
            div.className = "item-card";
            div.innerHTML = `<span>${item}</span>
                <div>
                    <button style="background:var(--edit); color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;" onclick="editItem('${item}')">تعديل</button>
                    <button style="background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; margin-right:5px;" onclick="deleteItem('${item}')">حذف</button>
                </div>`;
            grid.appendChild(div);
        });
        localStorage.setItem("items", JSON.stringify(localItems));
    }

    function saveItemToCloud(name) {
        if(!name || localItems.includes(name)) return;
        localItems.push(name);
        renderCloudItems();
        fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'add', item: name }) });
    }

    async function exportAsImage() {
        const rows = document.querySelectorAll("#resultTable tbody tr");
        if(rows.length === 0) return alert("الجدول فارغ");
        // نستخدم نفس المنطق لضمان الجودة
        const tempDiv = document.createElement("div");
        tempDiv.className = "export-page";
        tempDiv.style.left = "0"; // مؤقتاً للرسم
        tempDiv.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:5px solid #b08d57; padding-bottom:15px; margin-bottom:20px; background:white;">
                <img src="https://i.ibb.co/4R44srhj/image.jpg" style="width:100px; height:100px; border-radius:50%;">
                <div style="text-align:left;">
                    <h1 style="margin:0; color:#b08d57; font-size:45px; font-family:'Aref Ruqaa';">ال وحيد</h1>
                    <p style="margin:5px 0; font-size:20px; font-weight:bold;">كشف طلب مواد</p>
                </div>
            </div>
            <table class="export-table">
                <tbody>${Array.from(rows).map((r, i) => `<tr><td>${i+1}</td><td style="text-align:right;">${r.cells[0].innerText}</td><td>${r.cells[1].innerText}</td></tr>`).join('')}</tbody>
            </table>
        `;
        document.body.appendChild(tempDiv);
        const canvas = await html2canvas(tempDiv, { scale: 3, useCORS: true });
        const link = document.createElement('a');
        link.download = `طلب.png`; link.href = canvas.toDataURL("image/png"); link.click();
        document.body.removeChild(tempDiv);
    }

    async function shareAsImage() {
        const rows = document.querySelectorAll("#resultTable tbody tr");
        if(rows.length === 0) return alert("الجدول فارغ");
        const tempDiv = document.createElement("div");
        tempDiv.className = "export-page";
        tempDiv.innerHTML = `... نفس محتوى الصورة ...`; // للتبسيط
        document.body.appendChild(tempDiv);
        const canvas = await html2canvas(tempDiv, { scale: 3, useCORS: true });
        canvas.toBlob(async blob => {
            const file = new File([blob], `طلب.png`, { type: 'image/png' });
            if (navigator.share) await navigator.share({ files: [file] });
            document.body.removeChild(tempDiv);
        });
    }

    async function syncFromCloud() {
        const btn = document.getElementById("syncBtn");
        btn.disabled = true;
        try {
            const response = await fetch(GOOGLE_URL);
            const cloudData = await response.json();
            if (Array.isArray(cloudData)) {
                localItems = [...new Set([...localItems, ...cloudData])];
                renderCloudItems();
                alert("تم التحديث!");
            }
        } catch (e) { alert("خطأ في المزامنة"); }
        btn.disabled = false;
    }

    function switchPage(p) { 
        document.getElementById("orderPage").classList.toggle("hidden", p !== 'order');
        document.getElementById("browsePage").classList.toggle("hidden", p !== 'browse');
        document.getElementById("tab1").classList.toggle("active", p === 'order');
        document.getElementById("tab2").classList.toggle("active", p === 'browse');
    }

    function startVoice(inputId, callback = null) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ar-SA';
        recognition.start();
        recognition.onresult = (e) => {
            document.getElementById(inputId).value = e.results[0][0].transcript;
            if(callback) callback();
            else document.getElementById(inputId).dispatchEvent(new Event('input'));
        };
    }

    function deleteItem(name) { if(confirm("حذف؟")) { localItems = localItems.filter(i => i !== name); renderCloudItems(); } }
    function editItem(oldName) { const newName = prompt("تعديل:", oldName); if(newName) { localItems[localItems.indexOf(oldName)] = newName; renderCloudItems(); } }
    function clearTable() { if(confirm("مسح؟")) document.querySelector("#resultTable tbody").innerHTML = ""; }

    document.getElementById("itemSearch").oninput = function() {
        const val = this.value.toLowerCase();
        const resDiv = document.getElementById("results");
        resDiv.innerHTML = "";
        if(!val) return resDiv.classList.add('hidden');
        const matches = localItems.filter(i => i.toLowerCase().includes(val));
        matches.forEach(item => {
            const d = document.createElement("div");
            d.className = "result-item"; d.textContent = item;
            d.onclick = () => { document.getElementById("itemSearch").value = item; resDiv.classList.add('hidden'); document.getElementById("qty").focus(); };
            resDiv.appendChild(d);
        });
        resDiv.classList.remove('hidden');
    };
    window.onclick = (e) => { if (!e.target.matches('#itemSearch')) document.getElementById("results").classList.add('hidden'); };
</script>
</body>
</html>
